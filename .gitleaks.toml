# Gitleaks config for Quantalyze — Task 7.6
#
# We extend the default ruleset rather than redefining it. `useDefault =
# true` pulls in the full upstream rules (AWS, GCP, Stripe, GitHub,
# JWT, private keys, generic high-entropy strings, etc.), and we layer
# a narrow allowlist on top for known test fixtures that look like
# secrets but are not.
#
# Keep this file minimal. Every allowlist entry must be justified with a
# comment pointing at the fixture it protects. If a new intentional
# fixture starts tripping gitleaks, add a line here with its path, not a
# broad pattern.

title = "Quantalyze gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Known test fixtures and placeholder env samples"

# File-path allowlist — fixtures and sample files that contain
# intentionally key-shaped strings:
#
# - .env.example: documented placeholder values only (your-anon-key,
#   your-service-role-key, etc.). Contributors need this file.
# - src/lib/admin/pii-scrub.test.ts: unit test for the PII scrubber;
#   contains a canonical JWT fixture
#   (eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxMjM0NSJ9.SflKxwRJSMe...) used to
#   verify the scrubber redacts JWT-shaped strings. Not a real token.
# - tests/lib/admin/pii-scrub-python-parity.test.ts: Phase 18 / FIX-04
#   TS<->Python redaction parity test. Reuses the same canonical jwt.io
#   tutorial JWT fixture to assert TS-side scrubFreeformString redacts an
#   embedded JWT (regression for CR-01 + WR-01 four-pass parity with
#   redact.py). Not a real token.
# - src/components/error/ErrorEnvelope.test.tsx: Phase 17 component test
#   exercising the same PII scrubber from the ErrorEnvelope copy-diagnostics
#   path. Reuses the canonical jwt.io tutorial JWT fixture to assert
#   redaction (plain JWT and Authorization: Bearer <jwt>, CR-01 regression).
#   Not a real token.
# - package-lock.json: integrity hashes trip gitleaks generic
#   high-entropy detection; this is well-known noise to ignore.
# - .planning/: gstack planning artifacts (plan markdowns, summaries,
#   review reports). Pure prose with technical terms ("mid-Phase-14b",
#   migration filenames, RPC names) that the generic-api-key entropy
#   detector mistakes for secrets. These files ship documentation, not
#   credentials. The directory is force-added per the project's planning
#   workflow.
# - src/app/api/webhooks/resend/route.test.ts: Phase 16 OBSERV-03 webhook
#   verification test. Defines a synthetic Svix secret prefixed `whsec_`
#   (base64("test-secret-phase-16-observ-03")) used by the test signing helper
#   to verify Svix.verify() rejects bad signatures and accepts good ones.
#   Production secret is read from RESEND_WEBHOOK_SECRET env at request time;
#   the test value is overridden via vi.stubEnv and never reaches a wire.
# - analytics-service/tests/cassettes/: VCR-recorded HTTP fixtures. PII
#   already scrubbed at record time via conftest_vcr.py three-layer filter;
#   any high-entropy value remaining is a public response payload.
# - analytics-service/tests/test_c19_portfolio_fixes.py: Cluster-19 regression
#   suite for routers/portfolio.py. The test-only line
#   `slowapi.Limiter = _NoopLimiter  # type: ignore[...]` (a no-op rate-limiter
#   shim, mirroring test_routers_audit_2026_05_17) trips the generic-api-key
#   entropy detector on the assignment RHS in the historical PR-range scan.
#   Not a real secret — no credential material in this file. Audit-2026-05-07
#   cluster review batch a4.
# - src/__tests__/gitleaks-allowlist.test.ts: the H-0017 meta-test for THIS
#   allowlist config. Embeds the canonical jwt.io tutorial JWT fixture
#   (JWT_FIXTURE) to drive a real gitleaks scan asserting the allowlist
#   suppresses an allowlisted path and detects a non-allowlisted one. The
#   literal in the test source trips the default `jwt` rule. Not a real token.
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)src/lib/admin/pii-scrub\.test\.ts$''',
  '''(^|/)tests/lib/admin/pii-scrub-python-parity\.test\.ts$''',
  '''(^|/)src/components/error/ErrorEnvelope\.test\.tsx$''',
  '''(^|/)analytics-service/tests/test_encryption\.py$''',
  '''(^|/)analytics-service/tests/test_c19_portfolio_fixes\.py$''',
  '''(^|/)package-lock\.json$''',
  '''(^|/)\.planning/''',
  '''(^|/)src/app/api/webhooks/resend/route\.test\.ts$''',
  '''(^|/)analytics-service/tests/cassettes/''',
  # fix-list.md was historically copied to the repo root by audit-fix
  # automation. It contains audit prose describing high-entropy
  # identifiers (RPC names, on_conflict columns) that trip the generic
  # high-entropy detector. The canonical copy lives in
  # .planning/audit-2026-05-07/ (already allowlisted via the
  # .planning/ rule above). The root-level file is now gitignored;
  # this allowlist line also suppresses leftover historical commits.
  '''(^|/)fix-list\.md$''',
  '''(^|/)src/__tests__/gitleaks-allowlist\.test\.ts$''',
  # Phase 68 (DRB-02) Deribit scope-validation tests: mock the public/auth
  # response with deliberately key-shaped Client ID / Secret fixtures to
  # assert detect_deribit_permissions rejects write scopes and validates
  # read-only keys. Not real credentials — generic-api-key flags the fixture
  # on the push-to-main full scan (the PR-diff scan did not).
  '''(^|/)analytics-service/tests/test_deribit_scope_validation\.py$''',
  # H-0305 regression test (route.audit.test.ts): line 118 defines a
  # deliberately key-shaped fixture `secretContents` that the test injects into
  # a thrown upstream error to assert the create-with-key route STRIPS it from
  # the response body. Not a real secret — gitleaks generic-api-key flags the
  # fixture on the push-to-main full scan (the PR-diff scan did not). Audit H-0305.
  '''(^|/)src/app/api/strategies/create-with-key/route\.audit\.test\.ts$''',
  # H-0535 SecretStr redaction regression tests (audit-2026-05-07 batch 5).
  # Both files define deliberately key-shaped fixtures (AWS-style `AKIDLIVE…`
  # api_key / `SECRETLIVE…` api_secret) that the tests feed into
  # _redact_credentials to assert exchange credentials are scrubbed from logs
  # under SecretStr (the isinstance(str) re-leak trap). Not real secrets — the
  # whole point of the test is that these values get [REDACTED]. The
  # generic-api-key entropy detector flags the literals on the full scan.
  '''(^|/)analytics-service/tests/test_verify_strategy_redaction\.py$''',
  '''(^|/)analytics-service/tests/test_portfolio_router_audit_2026_05_07\.py$''',
]
