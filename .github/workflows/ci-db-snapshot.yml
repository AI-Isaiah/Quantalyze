name: CI DB Snapshot (regenerate)

# F10 — regenerate the committed CI schema snapshot (supabase/ci-snapshot/) from
# the canonical test project (qmnijlgmdhviwzwfyzlc). The snapshot lets CI stand
# up an ephemeral local Supabase instead of hitting the shared remote test DB.
#
# Run this AFTER a schema migration lands on main (the supabase-migrate pipeline
# applies it to the test/prod DB), then download the artifact, review the diff,
# and commit it. This workflow is manual-only and NEVER auto-pushes to main.
#
# Security:
#   - workflow_dispatch is collaborator-only (no fork/PR trigger surface).
#   - The Postgres DSN is passed via env: and only referenced as "$VAR" in run:,
#     never interpolated into the shell command string.
#   - No github.event.* untrusted input is used anywhere.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # No git ops here — the regenerated files leave as an artifact, not a
          # push. Drop the persisted GITHUB_TOKEN cred (attack surface).
          persist-credentials: false
      - name: Install psql client
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends postgresql-client
      - uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf  # v2.1.1
        with:
          version: 2.98.2
      - name: Regenerate schema snapshot + cron supplement + staleness hash
        env:
          # Raw Postgres DSN for the test project. `supabase db dump --db-url`
          # expects a percent-encoded connection string — store the secret in
          # that form. (Same secret the legacy remote sql-tests job consumed.)
          TEST_SUPABASE_DB_URL: ${{ secrets.TEST_SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${TEST_SUPABASE_DB_URL}" ]; then
            echo "::error::TEST_SUPABASE_DB_URL secret is required to regenerate the snapshot."
            exit 1
          fi
          # 02-schema.sql — schema-only DDL (no data → no PII). The CLI strips
          # CONCURRENTLY and rewrites to idempotent CREATE … IF NOT EXISTS /
          # OR REPLACE, and excludes internal schemas (auth/storage/cron/…).
          supabase db dump --db-url "$TEST_SUPABASE_DB_URL" -f supabase/ci-snapshot/02-schema.sql
          # 03-cron-jobs.sql — replay cron.job registrations (the dump excludes
          # the cron schema). format(%L) yields safely-quoted, replayable
          # cron.schedule() calls; cron.schedule upserts by jobname.
          {
            echo "-- F10 CI snapshot supplement: cron.job registrations (generated)."
            echo "-- Regenerated by .github/workflows/ci-db-snapshot.yml — do not edit by hand."
            psql "$TEST_SUPABASE_DB_URL" -tAqc \
              "SELECT string_agg(format('SELECT cron.schedule(%L, %L, %L);', jobname, schedule, command), E'\n' ORDER BY jobname) FROM cron.job;"
          } > supabase/ci-snapshot/03-cron-jobs.sql
          # MIGRATIONS.sha256 — staleness sentinel over the current migration
          # tree (scripts/ci-load-snapshot.sh checks this and fails loud on drift).
          ( cd supabase/migrations && find . -name '*.sql' | LC_ALL=C sort | xargs cat | sha256sum | awk '{print $1}' ) \
            > supabase/ci-snapshot/MIGRATIONS.sha256
          echo "Regenerated:"
          echo "  schema lines : $(wc -l < supabase/ci-snapshot/02-schema.sql)"
          echo "  cron jobs    : $(grep -c 'cron.schedule' supabase/ci-snapshot/03-cron-jobs.sql || true)"
          echo "  migrations   : $(cat supabase/ci-snapshot/MIGRATIONS.sha256)"
      - name: Show diff vs committed snapshot
        run: git --no-pager diff --stat -- supabase/ci-snapshot/ || true
      - name: Upload regenerated snapshot for review
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ci-snapshot
          path: supabase/ci-snapshot/
          retention-days: 7
