name: Supabase Migrate

# Applies Supabase migrations to production on workflow_dispatch.
#
# Flow:
#   1. `plan` job prints `supabase db push --include-all --dry-run` so the
#      EXACT command + flags the apply step will run are visible in the run
#      log first (the dry-run output IS what the operator approves).
#   2. `apply` job runs the same command without --dry-run on the
#      `Production` GitHub Environment. Before the push, a mechanical
#      "Backdated-migration safety guard" step rejects any local migration
#      whose timestamp is older than the most-recently-applied remote
#      migration unless it is on `.github/migrate-backdated-allowlist.txt`.
#
# Safety story (BUILD stage — required-reviewer gates NOT yet configured):
#   - workflow_dispatch-only (no auto-trigger on push)
#   - Backdated-migration safety guard mechanically blocks unallowlisted
#     timestamp gap-fills before they can apply
#   - Two-step plan-then-apply: the plan step uses --dry-run with the same
#     --include-all flag, so what the operator eyeballs IS what runs
#   - At scale (>=10 active clients), add required-reviewer protection to
#     the `Production` GitHub Environment per ADR-0009 (TODO). The
#     `environment: Production` lines below already pin the job to that
#     environment, so future protection-rule changes apply without further
#     workflow edits.
#
# Required GitHub repo configuration (one-time setup):
#   - Secret `SUPABASE_ACCESS_TOKEN`: a personal access token with
#     permission to manage the project (Supabase dashboard -> Account ->
#     Access Tokens).
#   - Secret `SUPABASE_DB_PASSWORD`: the database password for the target
#     project (Supabase dashboard -> Project -> Settings -> Database).
#   - Variable `SUPABASE_PROJECT_REF`: the project ref (e.g. `khslejtfbuezsmvmtsdn`).
#   - Environment `Production` (Settings -> Environments). At BUILD stage
#     no protection rules are configured; reviewers should be added
#     per ADR-0009 when client count justifies the operational overhead.
#
# Security note: this workflow consumes only repository secrets and
# variables. No untrusted github.event.* fields (PR titles, commit
# messages, etc.) are interpolated into `run:` blocks, so there is no
# surface for script-injection via attacker-controlled input.
#
# Manual trigger: use the "Run workflow" button in the Actions tab to
# re-run against the current state of main (useful after fixing a failed
# apply).

on:
  # Manual-only since 2026-05-15 (PR-Y1). The auto-on-push trigger caused
  # the workflow to fail on every migration-touching merge because the
  # local sequential-numbered files (NNN_*.sql) did not match the
  # timestamp-versioned rows the remote schema_migrations table records.
  # PR-Y1 reconciled local file names + remote schema_migrations rows.
  #
  # RE-ENABLE THE PUSH TRIGGER ONLY WHEN ALL OF THE FOLLOWING ARE TRUE:
  #   1. PR-Y2 has shipped: migrations 107 (verification_requests view shim)
  #      and 119 (positions_natural_key UNIQUE constraint) — both currently
  #      have "applied" rows in prod's schema_migrations but their SQL bodies
  #      have NOT been executed (see deferred-apply warnings in those files).
  #   2. PR-Y2 has reconciled the test project (qmnijlgmdhviwzwfyzlc) the
  #      same way prod was reconciled — currently test still has stale TS
  #      versions for ~100 rows that don't match local filenames.
  #   3. A manual workflow_dispatch run shows `supabase db push` is a true
  #      no-op against prod (`Remote database is up to date` in the log).
  #   4. Phase 19 soak window has closed (kill-switch flip completed,
  #      168h soak passed without rollback).
  # Re-enabling early risks resurfacing the same workflow-failing drift.
  workflow_dispatch:

concurrency:
  group: supabase-migrate-${{ github.ref }}
  cancel-in-progress: false

# C-0293(a) fix: workflow only needs to checkout the tree and run the
# supabase CLI against a remote DB via its access token. No GitHub API
# writes (no issue/PR/release creation), so `contents: read` is the
# entire surface. The actual DB-mutation power comes from the
# SUPABASE_ACCESS_TOKEN secret + the workflow_dispatch-only trigger +
# the Backdated-migration safety guard step in the apply job — all
# orthogonal to GITHUB_TOKEN scope. (Required-reviewer protection on
# the `Production` environment is a TODO per ADR-0009.)
permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    # retro-PR179-M-env-gate: the plan job consumes SUPABASE_DB_PASSWORD
    # to run `supabase link --project-ref` (which writes the password
    # into a local supabase config file). Both jobs are pinned to the
    # `Production` GitHub Environment so any future protection-rule
    # additions (required reviewers per ADR-0009) take effect uniformly
    # across plan + apply without further workflow edits. At BUILD
    # stage `Production` has no protection rules — the safety story
    # is workflow_dispatch-only + the backdated-migration guard.
    environment: Production
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. The plan job uses
          # SUPABASE_ACCESS_TOKEN for DB ops; no GITHUB_TOKEN-backed
          # git operations happen here.
          persist-credentials: false
      - name: Check secrets are configured
        id: check
        env:
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Supabase Migrate skipped — secrets not configured. Set SUPABASE_PROJECT_REF (var), SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD (secrets) to enable auto-migration."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51  # v1.6.0
        if: steps.check.outputs.configured == 'true'
        with:
          version: latest
      - name: List migration diff (remote vs local)
        if: steps.check.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase migration list

  apply:
    needs: plan
    if: needs.plan.outputs.configured == 'true'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. The apply job uses
          # SUPABASE_ACCESS_TOKEN; no GITHUB_TOKEN-backed git ops.
          persist-credentials: false
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51  # v1.6.0
        with:
          version: latest
      - name: Push migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        # --include-all is required to apply migrations that gap-fill earlier timestamp slots
        # (e.g. when a history-only restoration like PR #176 lands before subsequent additions).
        # Without it, db push refuses with "Found local migration ... that is below remote tip".
        #
        # Safety story (BUILD stage — required reviewers NOT yet configured):
        #   - workflow_dispatch-only (no auto-trigger on push)
        #   - The "Backdated-migration safety guard" step above mechanically rejects any
        #     local migration whose timestamp is older than the most-recently-applied
        #     remote migration unless on .github/migrate-backdated-allowlist.txt
        #   - Two-step plan-then-apply with `--dry-run` on plan so the operator sees the
        #     EXACT command output before approving apply
        #   - At scale (>=10 active clients), add required-reviewer protection to the
        #     `Production` environment per ADR-0009 (TODO).
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push --include-all
