# Phase 19 / BACKBONE-04 — hourly PRODUCTION soak gate (legacy-write detector).
#
# Rewritten 2026-05-25 (go/no-go review). Two corrections vs. the prior version:
#   1. Targets PRODUCTION (khslejtfbuezsmvmtsdn), not the test project. The old
#      version checked the test DB, where no real traffic happens, so a green
#      run proved nothing about prod.
#   2. Measures via the read-only `phase19_soak_status` RPC using the prod ANON
#      key — no service_role key in CI. The old version counted audit_log rows
#      from a trigger that was never shipped to prod, so the count was always 0
#      (vacuously green). It now counts the legacy table directly and
#      cross-checks the live kill-switch, so a green run MEANS something.
#
# Honesty / fail-loud:
#   * Soak not started (flag OFF + flag_flipped_at=TODO) -> GREEN but emits a
#     loud ::warning:: ("measured nothing"), never a silent pass.
#   * Flag ON but flag_flipped_at unrecorded -> FAIL (exit 6). This is the exact
#     trap that stalled the rollout (flipped, then auto-rolled-back, soak never
#     recorded); it can no longer pass silently.
#   * Flag rolled back mid-window -> FAIL (exit 7); soak must restart.
#   * Any write to the legacy table since the flip -> FAIL (exit 4); PR-D blocked.
#
# Required secrets (ANON key, NOT service_role — chosen for least blast radius):
#   PROD_SUPABASE_URL        https://khslejtfbuezsmvmtsdn.supabase.co
#   PROD_SUPABASE_ANON_KEY   prod anon/publishable key
#   (RPC supabase/migrations/20260525113000_phase19_soak_status_rpc.sql must be
#    applied to prod first.)
#
# Injection-safety: no github.event.* inputs are referenced anywhere in this
# workflow. The only inputs are the two PROD_* secrets, passed via env: and
# read by the script from the process environment (never interpolated into a
# run: shell line), plus a literal project id. No untrusted-input surface.
name: Phase 19 stability — no legacy writes (prod)

on:
  schedule:
    - cron: "0 * * * *"  # hourly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Soak gate — zero writes to legacy verification_requests (prod)
        run: |
          set +e
          bash scripts/verify-no-legacy-writes.sh
          rc=$?
          set -e
          if [ "$rc" = "2" ]; then
            echo "::warning title=Phase 19 soak NOT started::Kill-switch OFF / flag_flipped_at unrecorded (or PROD secrets unset) — this run measured nothing. The 168h soak has not begun."
            exit 0
          fi
          exit "$rc"
        env:
          SUPABASE_PROJECT_ID: khslejtfbuezsmvmtsdn  # prod (informational only)
          PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          PROD_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
