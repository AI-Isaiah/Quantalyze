name: Contracts

# B25 — the by-construction enforcement layer. A single focused gate for the
# cross-cutting refactor program's invariants: the eslint-plugin-quantalyze
# rules (raw localStorage / published-predicate / Retry-After parse bans) and
# the contracts registry guard (every named invariant test still exists + the
# plugin/config wiring is intact). Future batches (B9 no-passthrough-on-ipc,
# B14 freshness-signal-consumption, B17 labeled-metric-consumption) add their
# rules to the plugin and are covered here automatically.
#
# This runs alongside the broader frontend-lint / frontend-test jobs (which
# also execute these rules + tests); it exists as the named, discoverable
# "contracts" surface the consolidation prescribes, kept fast and focused.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: contracts-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Minimal default GITHUB_TOKEN scope (B24 workflow-security baseline): just
# enough for actions/checkout to read the tree.
permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - name: Restore node_modules
        id: node_modules_cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: npm ci (cache miss; retry transient network failures)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci --prefer-offline --no-audit --no-fund; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      - name: Contracts registry + lint-rule fixtures
        run: npx vitest run src/__tests__/contracts/ tools/eslint-plugin-quantalyze/tests/
      - name: ESLint by-construction rules over src
        run: npx eslint --cache --cache-location node_modules/.cache/.eslintcache src/
