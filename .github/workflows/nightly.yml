name: Nightly probes

on:
  schedule:
    # Every day at 08:00 UTC (01:00 PT). Runs before West Coast business
    # hours so a broken staging shows up on the founder's first coffee.
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  demo-pdf-coldstart:
    runs-on: ubuntu-latest
    # First-line guard on STAGING_BASE_URL: empty or single-space values
    # are treated as unset. The shell step below applies a stricter trim
    # check (belt + suspenders) since GH Actions expressions have no
    # trim function and can't catch multi-character whitespace.
    if: ${{ vars.STAGING_BASE_URL != '' && vars.STAGING_BASE_URL != ' ' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run PDF cold-start probe
        id: probe
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.STAGING_BASE_URL }}
          DEMO_PDF_SECRET: ${{ secrets.DEMO_PDF_SECRET }}
        run: |
          # Secondary guard: bail early with a clear message if the secret
          # is missing, so the workflow doesn't burn a Playwright run on a
          # 401 that will always fire.
          if [ -z "$DEMO_PDF_SECRET" ]; then
            echo "::warning::DEMO_PDF_SECRET not set — skipping PDF probe."
            exit 0
          fi
          # Also bail if the base URL is whitespace-only (belt + suspenders
          # to the `if:` guard above).
          trimmed="$(echo "$PLAYWRIGHT_BASE_URL" | tr -d '[:space:]')"
          if [ -z "$trimmed" ]; then
            echo "::warning::STAGING_BASE_URL was whitespace-only — skipping PDF probe."
            exit 0
          fi
          npx playwright test e2e/portfolio-pdf-demo.spec.ts --grep @nightly
      - name: Upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-pdf-report
          path: playwright-report/
          retention-days: 14
      - name: Open GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          RUN_ID: ${{ github.run_id }}
          REPO_NAME: ${{ github.repository }}
        with:
          script: |
            const { RUN_ID, REPO_NAME } = process.env;
            const today = new Date().toISOString().slice(0, 10);
            const title = `Nightly PDF probe failed on ${today}`;
            const body = [
              "The nightly demo-PDF cold-start probe failed. The forwarded /demo URL may be broken.",
              "",
              `Workflow run: https://github.com/${REPO_NAME}/actions/runs/${RUN_ID}`,
              "",
              "Likely causes: Puppeteer cold-start regression, Supabase connectivity, DEMO_PDF_SECRET rotation, token format drift.",
              "",
              "Auto-filed by .github/workflows/nightly.yml.",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["nightly-probe", "p0"],
            });
