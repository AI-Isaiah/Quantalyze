name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm audit --audit-level=high || true
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role
          ADMIN_EMAIL: test@example.com
          PLATFORM_NAME: Quantalyze
          PLATFORM_EMAIL: test@quantalyze.com

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: analytics-service/requirements.txt
      - run: pip install -r requirements.txt pytest pytest-cov pytest-asyncio pytest-mock cryptography
      - run: pytest --cov=services --cov-report=term-missing --cov-fail-under=80

  e2e:
    # Runs a small Playwright suite against a placeholder-env Next.js build.
    # Scope: auth + smoke specs only. The full match-queue.spec.ts requires a
    # seeded staging Supabase and hard-coded test credentials that CI does
    # not have access to. Expand the --grep pattern once a seeded CI Supabase
    # is available.
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role
          ADMIN_EMAIL: test@example.com
          PLATFORM_NAME: Quantalyze
          PLATFORM_EMAIL: test@quantalyze.com
      - name: Start server and run Playwright
        run: |
          npm run start &
          SERVER_PID=$!
          # Wait for server to respond (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          npx playwright test e2e/auth.spec.ts e2e/smoke.spec.ts e2e/demo-public.spec.ts e2e/demo-founder-view.spec.ts e2e/demo-screenshot.spec.ts
          kill $SERVER_PID 2>/dev/null || true
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role
          ADMIN_EMAIL: test@example.com
          PLATFORM_NAME: Quantalyze
          PLATFORM_EMAIL: test@quantalyze.com
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
