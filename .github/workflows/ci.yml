name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI on PR force-pushes only. On `push` to `main`, every
# commit must produce its own recorded green CI run (deploy automation +
# branch protection key on per-SHA status); cancelling intermediate runs
# would leave `main` commits without a green check. `head_ref` is set on
# pull_request events and empty on push events — falling back to `run_id`
# (unique per run) ensures push events never share a group key, so they
# never cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# C-0293(a) fix: minimal default GITHUB_TOKEN scope. Without this block,
# GITHUB_TOKEN inherits the repo default (which is `contents: write` plus
# write on issues/packages/PRs/statuses), so a compromised third-party
# action would have a write-all credential to pivot from. We default to
# `contents: read` (enough for actions/checkout to fetch the tree) and
# uplift specific jobs that genuinely need more (secret-scan grants
# pull-requests: write so gitleaks can post finding comments). The
# release/migration paths live in other workflows that gate on the
# `production` GitHub environment + manual approval.
permissions:
  contents: read

jobs:
  # CI speedup PR-B (v0.22.1.2+): the prior monolithic `frontend` job ran
  # typecheck → lint → test → policy-checks → audit → build serially
  # (~5min wall clock). Split into 5 parallel jobs so wall-clock collapses
  # to max-of-jobs (~build, ~3min). Each parallel job pays the cold
  # `npm ci` cost (~30-60s), but `actions/setup-node@v4 cache: npm`
  # restores `~/.npm` so subsequent `npm ci`s are tarball-extract-only.
  # Branch protection still gates on a single check (the aggregator
  # `frontend` job below `needs:` all parallel jobs).
  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. No subsequent step in
          # this job pushes back to the repo; the cred is pure attack
          # surface for any third-party action that lands later.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline --no-audit --no-fund
      # PR-C: cache TypeScript's incremental build info (tsconfig.json has
      # `incremental: true`, so tsc emits tsconfig.tsbuildinfo in the project
      # root). On unchanged code, tsc skips fully re-checking files whose
      # imports haven't changed since the last successful run — typecheck
      # drops 30-60% on small diffs.
      - name: Cache tsconfig.tsbuildinfo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: tsconfig.tsbuildinfo
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('package-lock.json', 'tsconfig.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-${{ hashFiles('package-lock.json', 'tsconfig.json') }}-
      - run: npm run typecheck

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. No subsequent step in
          # this job pushes back to the repo; the cred is pure attack
          # surface for any third-party action that lands later.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline --no-audit --no-fund
      # PR-C: cache ESLint's per-file result cache. The `lint` script in
      # package.json now passes `--cache --cache-location
      # node_modules/.cache/.eslintcache`. ESLint skips re-linting files
      # whose mtime + content hash haven't changed since the last run —
      # repeat lint on unchanged files drops to milliseconds.
      - name: Cache ESLint
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: node_modules/.cache/.eslintcache
          key: ${{ runner.os }}-eslintcache-${{ hashFiles('package-lock.json', 'eslint.config.*', '.eslintrc*') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-eslintcache-${{ hashFiles('package-lock.json', 'eslint.config.*', '.eslintrc*') }}-
      - run: npm run lint

  frontend-test:
    # PR-C extension: shard vitest 3 ways. Wall clock collapses to the
    # slowest shard (~1/3 of monolithic). Each shard pays its own npm ci
    # but runs in parallel; the user-visible critical path shrinks. Also
    # cache vitest's transform graph at node_modules/.vite — on a warm
    # cache the TS/JSX transform step is largely a no-op.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. No subsequent step in
          # this job pushes back to the repo; the cred is pure attack
          # surface for any third-party action that lands later.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline --no-audit --no-fund
      # Cache vitest's transform graph. Vite persists per-file TS/JSX
      # transforms here; on a warm cache the transform step is largely a
      # no-op. Key on lockfile + vitest config + the src/tests trees.
      - name: Cache vitest transform (node_modules/.vite)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-vitest-${{ hashFiles('package-lock.json', 'vitest.config.ts') }}-${{ hashFiles('src/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-vitest-${{ hashFiles('package-lock.json', 'vitest.config.ts') }}-
      - name: Run vitest shard ${{ matrix.shard }}/3
        run: npx vitest run --shard=${{ matrix.shard }}/3 --reporter=dot

  frontend-policy:
    # Banned-package check + GDPR export coverage. PR-C moved npm audit
    # to the nightly workflow because (a) it's a security signal, not a
    # per-PR functional gate, (b) Dependabot/Snyk already cover the
    # critical-severity surface continuously, and (c) keeping it on the
    # per-PR critical path adds 15-30s with no behavior signal.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. No subsequent step in
          # this job pushes back to the repo; the cred is pure attack
          # surface for any third-party action that lands later.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline --no-audit --no-fund
      - name: Check for banned packages (supply-chain)
        run: node scripts/check-banned-packages.mjs
      - name: Check GDPR export coverage (Task 7.3)
        run: npx tsx scripts/check-gdpr-export-coverage.ts

  frontend-build:
    # The build is the longest single step. It runs in parallel with the
    # other frontend-* jobs (above) and uploads the .next + public output
    # as an artifact so the e2e job can download instead of rebuilding —
    # eliminating the duplicate ~60-120s build that used to live in e2e.
    #
    # C-0293(c) artifact-leak fix: this job builds with PLACEHOLDER
    # NEXT_PUBLIC_SUPABASE_* env values UNCONDITIONALLY (no longer the
    # seed-aware ternary). The previous behavior baked the real
    # TEST_SUPABASE_URL + TEST_SUPABASE_ANON_KEY into the client bundles
    # in `.next/**` whenever vars.E2E_TEST_DB_CONFIGURED was true, then
    # uploaded that artifact (where any third-party action in the same
    # workflow run has `actions: read` and could grep for inlined creds).
    # The seed-gated e2e specs now rebuild locally inside the e2e job
    # with the real env, and that rebuilt `.next/` stays on the runner
    # FS — it is never uploaded as an artifact.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. No subsequent step in
          # this job pushes back to the repo; the cred is pure attack
          # surface for any third-party action that lands later.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline --no-audit --no-fund
      # Cache .next/cache (Next.js incremental webpack/Turbopack output) keyed
      # on every input that changes how the bundle compiles: lockfile,
      # next.config, tailwind/postcss config, tsconfig, and the full src
      # tree (any extension). The wide src glob catches CSS, MDX, JSON,
      # locale files etc. that a `.ts/.tsx` glob would silently miss —
      # missing them means a config change ships against a stale cache.
      # restore-keys ladder is intentionally short: only fall back to a
      # lockfile-matched cache, never to a "different lockfile" prefix
      # (cross-Next-version cache restore is a known hazard).
      - name: Cache .next/cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'next.config.*', 'tsconfig.json', 'tailwind.config.*', 'postcss.config.*') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'next.config.*', 'tsconfig.json', 'tailwind.config.*', 'postcss.config.*') }}-
      # C-0293(c): build with PLACEHOLDERS unconditionally. The previous
      # seed-aware ternary leaked test-DB credentials into the uploaded
      # artifact (see the security comment on this job header above).
      # The seed-gated e2e specs rebuild locally with the real env in
      # the e2e job, and that rebuilt `.next/` is never uploaded.
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role
          ADMIN_EMAIL: test@example.com
          PLATFORM_NAME: Quantalyze
          PLATFORM_EMAIL: test@quantalyze.com
      # Upload the build output for the e2e job to download. Exclude
      # .next/cache (the actions/cache above already persists it across
      # runs; including it here would inflate every per-run artifact by
      # 100MB+ for no e2e benefit). upload-artifact@v4 negative globs
      # only exclude entries that actually match the negative pattern,
      # so the directory match must use `/**` to recurse — `!.next/cache`
      # alone only excludes the directory entry, not its contents.
      - name: Upload .next + public artifact for e2e
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: nextjs-build
          path: |
            .next/**
            !.next/cache/**
            public/**
          retention-days: 1
          if-no-files-found: error
          # Critical: upload-artifact@v4 defaults `include-hidden-files: false`,
          # which excludes any path starting with `.` — `.next` is dotfile-
          # prefixed so the action silently uploaded only `public/**` (6 files,
          # 60KB total) when this was missing. The e2e job's `next start` then
          # crashed with "Could not find a production build in the '.next'
          # directory" because the artifact carried no .next at all.
          include-hidden-files: true

  frontend:
    # Aggregator. Branch protection gates on this single required check;
    # `needs:` enforces that every parallel frontend-* job above passed.
    # `if: always()` + the explicit result-check below is critical: a bare
    # `needs:` chain marks the aggregator as `skipped` (not `failed`) when
    # any upstream fails, and `skipped` checks can satisfy classic GitHub
    # branch protection rules — silently letting broken code merge. The
    # explicit `exit 1` on any non-success forces a definite `failure`
    # status that all branch-protection configurations honor.
    runs-on: ubuntu-latest
    needs:
      - frontend-typecheck
      - frontend-lint
      - frontend-test
      - frontend-policy
      - frontend-build
    if: always()
    steps:
      - name: Verify all frontend-* jobs succeeded
        run: |
          fail=0
          for r in \
            "frontend-typecheck=${{ needs.frontend-typecheck.result }}" \
            "frontend-lint=${{ needs.frontend-lint.result }}" \
            "frontend-test=${{ needs.frontend-test.result }}" \
            "frontend-policy=${{ needs.frontend-policy.result }}" \
            "frontend-build=${{ needs.frontend-build.result }}"; do
            name="${r%=*}"; result="${r#*=}"
            echo "$name: $result"
            if [ "$result" != "success" ]; then fail=1; fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::One or more frontend-* jobs did not succeed."
            exit 1
          fi
          echo "All frontend-* jobs succeeded."

  sql-tests:
    # audit-2026-05-07 follow-up Issue 6 — wire the supabase/tests/test_*.sql
    # files into CI. Pre-fix, the 5 plain PL/pgSQL test files were
    # committed but never invoked by any workflow or `package.json`
    # script — covering P911-P920, P917, P918, P919, P920, P455, P475
    # with no CI signal. A future migration could silently break the
    # sanitize_user sentinel trigger, the retention guard, the data
    # deletion FK action, the log_audit_event_service ceiling, or the
    # wizard draft guard with no test failure to catch it.
    #
    # Security (audit-2026-05-07 red-team Finding 6): TWO defenses:
    #
    #   1. Fork-author gate. Forked-PR runs MUST NOT receive
    #      TEST_SUPABASE_DB_URL — GitHub's default secret policy blocks
    #      it for fork PRs, but we also explicitly check
    #      github.event.pull_request.head.repo.full_name. Defense in
    #      depth means an internal-branch PR with a typo'd vars setting
    #      can't accidentally let a fork PR through.
    #
    #   2. Meta-command filter. Even with the gate, a malicious internal
    #      PR could commit a test file containing psql meta-commands
    #      (\!, \copy, \o, \COPY) that exfiltrate secrets from the
    #      runner. We grep each test file before psql -f and bail with
    #      an explicit error if any of those tokens appear. This is a
    #      file-content check; the env: injection still keeps the secret
    #      out of any run: shell-substitution surface.
    #
    # The if: gate composes both: fork PRs are blocked AND the
    # E2E_TEST_DB_CONFIGURED variable must be set. No untrusted
    # github.event.* content flows into any run: step — every reference
    # to a github.event.* value sits in YAML expressions evaluated at
    # workflow-parse time, never in shell substitution.
    #
    # Gating: same `vars.E2E_TEST_DB_CONFIGURED` pattern as the e2e job.
    # When the variable is unset (forks, repos without test-DB setup),
    # the job no-ops. Postgres connection string comes from
    # `secrets.TEST_SUPABASE_DB_URL` — a separate secret from the
    # PostgREST/HTTP-shaped TEST_SUPABASE_URL because psql speaks the
    # raw Postgres wire protocol (port 5432/6543 via pooler) rather than
    # the HTTPS REST API. If TEST_SUPABASE_DB_URL is not yet wired, the
    # step fails explicitly so the gate flips from "silent" to "loud
    # follow-up to provision the secret".
    #
    # The test files use plain `RAISE EXCEPTION` (no pgTAP) — under
    # `psql -v ON_ERROR_STOP=1` a failed assertion exits non-zero and
    # fails the job.
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && vars.E2E_TEST_DB_CONFIGURED == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. The sql-tests job
          # consumes TEST_SUPABASE_DB_URL but does no git ops; the
          # persisted cred is pure attack surface.
          persist-credentials: false
      - name: Install psql client
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Preflight - reject psql meta-commands in test files (Finding 6)
        # Reject any test file containing psql meta-commands that could
        # exfiltrate secrets from the runner. Specifically:
        #   \!       — shell escape (executes any shell command, can
        #              read env vars / curl them out)
        #   \copy    — client-side file IO (can read /etc/passwd,
        #              the workflow's environment dumps, etc.)
        #   \o ...   — redirect query output to a file (can persist
        #              secrets into an artifact)
        #   \COPY    — upper-case form of \copy
        # All four are PSQL CLIENT-side; the server's check_function
        # cannot help. We refuse them at the file level.
        #
        # We deliberately use plain grep (no -P) so the patterns are
        # ERE-portable, and \\! requires single-quoting to keep the
        # backslash literal through the shell.
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(supabase/tests/test_*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No supabase/tests/test_*.sql files to scan."
            exit 0
          fi
          bad=0
          for f in "${files[@]}"; do
            # Each pattern is its own grep so the error message can name
            # the exact meta-command that triggered the reject.
            if grep -nE '^\\\!|^\\!| \\\!| \\!' "$f" >/dev/null 2>&1; then
              echo "::error file=$f::contains '\\!' (shell escape) — refused by Finding 6 preflight"
              bad=1
            fi
            if grep -nE '\\copy\b' "$f" >/dev/null 2>&1; then
              echo "::error file=$f::contains '\\copy' (client file IO) — refused by Finding 6 preflight"
              bad=1
            fi
            if grep -nE '\\COPY\b' "$f" >/dev/null 2>&1; then
              echo "::error file=$f::contains '\\COPY' (client file IO) — refused by Finding 6 preflight"
              bad=1
            fi
            if grep -nE '^\\o |^\\o$| \\o ' "$f" >/dev/null 2>&1; then
              echo "::error file=$f::contains '\\o' (output redirect) — refused by Finding 6 preflight"
              bad=1
            fi
          done
          if [ "$bad" = 1 ]; then
            echo "::error::One or more SQL test files contain a refused psql meta-command."
            exit 1
          fi
          echo "Preflight clean: ${#files[@]} test file(s) free of refused meta-commands."
      - name: Run SQL self-tests against test Supabase project
        env:
          # PG connection string for the test project (qmnijlgmdhviwzwfyzlc).
          # Must be the raw Postgres DSN (postgresql://...), NOT the
          # HTTPS REST URL (TEST_SUPABASE_URL). If the secret is not
          # configured, the step exits with an explicit message rather
          # than silently passing — Issue 6 is specifically about the
          # silent-no-op surface.
          TEST_SUPABASE_DB_URL: ${{ secrets.TEST_SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${TEST_SUPABASE_DB_URL}" ]; then
            echo "::error::TEST_SUPABASE_DB_URL secret is required to run SQL self-tests."
            echo "::error::Set this secret to the raw Postgres DSN for the test Supabase project."
            echo "::error::Format: postgresql://postgres.<project-ref>:<password>@<pooler-host>:6543/postgres"
            exit 1
          fi
          echo "Discovering supabase/tests/test_*.sql files..."
          shopt -s nullglob
          files=(supabase/tests/test_*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No supabase/tests/test_*.sql files found — Issue 6 invariant drifted."
            exit 0
          fi
          echo "Found ${#files[@]} test file(s):"
          printf '  - %s\n' "${files[@]}"
          # ON_ERROR_STOP=1 + the test files' RAISE EXCEPTION lines mean
          # a failed assertion exits non-zero and fails this step.
          for f in "${files[@]}"; do
            echo ""
            echo "=== Running: $f ==="
            psql "$TEST_SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo ""
          echo "All ${#files[@]} SQL self-tests passed."

  secret-scan:
    # Task 7.6: gitleaks runs against the full commit history for PRs
    # (fetch-depth: 0) and against the pushed commits on main. Config
    # lives in .gitleaks.toml (extends the default ruleset with a
    # narrow allowlist for known test fixtures).
    runs-on: ubuntu-latest
    # C-0293(a) per-job uplift: gitleaks-action posts finding summaries
    # as PR comments when a leak is detected (so the author sees the
    # diagnostic without digging into the workflow log). That requires
    # `pull-requests: write`. `contents: read` is inherited from the
    # workflow-level default for checkout. No other scope needed.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0
          # retro-PR179-M-persist-chain: actions/checkout defaults
          # persist-credentials: true, which writes GITHUB_TOKEN as
          # http.https://github.com/.extraheader in .git/config. With
          # this job's pull-requests: write uplift, a compromised
          # gitleaks-action SHA could read the token from .git/config
          # AND comment on arbitrary PRs. Explicitly drop the cred so
          # the SHA-pin defense isn't undercut by the persisted token.
          # The gitleaks step gets GITHUB_TOKEN via env: below
          # (intentional, scoped read).
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  docs-link-check:
    # Task 7.4: link-check hook on docs/runbooks/soc2-readiness.md (and
    # the rest of docs/**) to keep evidence links honest. Internal links
    # only — external URL breakage should not fail CI because the
    # runbooks reference third-party provider docs whose URLs we do not
    # own. `--offline` resolves file:// and relative paths against the
    # checked-out tree; the no-progress flag keeps CI logs quiet.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. lychee-action only
          # reads the checked-out tree; the persisted cred is pure
          # attack surface for any third-party action that lands later.
          persist-credentials: false
      - name: Link-check docs (internal links only)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: >-
            --offline
            --no-progress
            --verbose
            docs/runbooks/soc2-readiness.md
            'docs/runbooks/**/*.md'
          fail: true

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics-service
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. The python/pytest job
          # consumes TEST_SUPABASE_* secrets but does no git ops; the
          # persisted cred is pure attack surface.
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: analytics-service/requirements.txt
      - run: pip install -r requirements.txt pytest pytest-cov pytest-asyncio pytest-mock cryptography mypy
      # Phase 19 / BACKBONE-02 / MC-3 fix: @runtime_checkable Protocol only
      # verifies method *presence* at runtime, not signature shape. mypy
      # --strict scoped to services/ingestion/ catches signature drift
      # (e.g. `validate(req)` vs `validate(request)`) at type-check time
      # before the test pipeline. --follow-imports=silent keeps strictness
      # local to the new package; the legacy untyped surface migrates
      # incrementally.
      - run: mypy --strict --follow-imports=silent services/ingestion/
      # PR #149 v0.22.25.3 follow-up: wire the test Supabase project into
      # the python job so the P97 fence regression tests in
      # tests/test_compute_jobs_fencing.py execute against a real DB. The
      # test project (`qmnijlgmdhviwzwfyzlc`) was caught up to main's
      # migration head (109-119 applied 2026-05-12), so live-DB fixtures
      # no longer hit pre-existing schema drift.
      #
      # Gated on the repository VARIABLE `E2E_TEST_DB_CONFIGURED` (NOT
      # `secrets.X != ''`) — vars are introspectable in workflow logs so
      # a missing/typo'd var fails loudly. When the var is unset (forks,
      # repos without a configured test DB), the secrets fall back to
      # empty strings AND `CI` is demoted to '' so `_need_supabase()` in
      # `tests/test_compute_jobs_fencing.py` falls into the `pytest.skip`
      # branch instead of the CI=true hard-fail branch.
      - run: pytest --cov=services --cov-report=term-missing --cov-fail-under=80
        env:
          SUPABASE_TEST_URL: ${{ vars.E2E_TEST_DB_CONFIGURED == 'true' && secrets.TEST_SUPABASE_URL || '' }}
          SUPABASE_TEST_SERVICE_KEY: ${{ vars.E2E_TEST_DB_CONFIGURED == 'true' && secrets.TEST_SUPABASE_SERVICE_ROLE_KEY || '' }}
          CI: ${{ vars.E2E_TEST_DB_CONFIGURED == 'true' && 'true' || '' }}

  e2e:
    # Runs a small Playwright suite against a placeholder-env Next.js build.
    # Scope: auth, smoke, and the public /demo specs (demo-public +
    # demo-founder-view). The full match-queue.spec.ts requires a seeded
    # staging Supabase and hard-coded test credentials that CI does not
    # have access to — expand the spec list below once a seeded CI
    # Supabase is available.
    #
    # demo-screenshot.spec.ts is intentionally NOT in the full CI scope:
    # it compares against chromium-linux baseline PNGs that must be
    # generated inside the Playwright Linux Docker image and committed
    # alongside the spec. Until those baselines exist, running the spec
    # in CI fails on "snapshot doesn't exist" for every case.
    #
    # C-0300 fix: a sentinel test inside that spec ("C-0300 sentinel:
    # chromium-linux baselines committed") runs unconditionally in CI
    # via the dedicated --grep invocation in the Playwright step below.
    # The sentinel asserts that the baseline PNG files exist on disk —
    # if they don't, CI fails loudly instead of the prior silently-
    # excluded state. Once baselines land, drop the --grep gate and add
    # the spec to the unconditional list.
    runs-on: ubuntu-latest
    # PR-B: depend on frontend-build (for the artifact) PLUS the cheaper
    # correctness gates so e2e doesn't burn ~3-5min of runner time when a
    # typecheck or test failure is already known. Don't depend on the
    # aggregator — that would only start after lint and audit-policy too,
    # which don't gate e2e validity. Branch protection still gates merges
    # on the `frontend` aggregator above.
    needs:
      - frontend-build
      - frontend-typecheck
      - frontend-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. No subsequent step in
          # this job pushes back to the repo; the cred is pure attack
          # surface for any third-party action that lands later.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline --no-audit --no-fund
      # Cache the Playwright browser bundle (~120MB chromium) keyed on the
      # `@playwright/test` package version specifically — not the whole
      # lockfile. Keying on lockfile would bust the cache for every
      # unrelated dep update; keying on Playwright's package.json (which
      # `npm ci` materialized in node_modules) means the cache only rolls
      # when Playwright itself changes, which is what determines the
      # browser bundle compatibility.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('node_modules/@playwright/test/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      # On cache hit, skip the install entirely. The chromium browser is
      # restored from the cache; GitHub ubuntu-latest runners have all
      # the system libs chromium needs (libnss3, libgtk-3-0, libgbm1,
      # etc.) baked in. The previous version ran `playwright install-deps
      # chromium` (apt-get update + 30 lib install) on cache hit, which
      # observed 5+ minutes on a slow apt mirror — defeating the cache
      # win. If a future runner image update drops a chromium-required
      # lib, the playwright run will fail with a clear missing-lib error
      # and we add it back. On cache miss, do the full install (download
      # + apt deps).
      - name: Install Playwright (browser bundle from cache when available)
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — chromium bundle restored. Runner image has system libs; skipping apt install."
          else
            npx playwright install --with-deps chromium
          fi
      # PR-B: Download the build artifact from frontend-build instead of
      # rebuilding. Saves 60-120s on every e2e run (the prior single-build
      # consolidation in PR-A still rebuilt; this eliminates the rebuild
      # entirely). The artifact carries the seed-aware NEXT_PUBLIC_* vars
      # baked into client bundles at build time.
      - name: Download .next + public artifact from frontend-build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: nextjs-build
          # download-artifact restores at the cwd by default; .next and
          # public extract to project root, matching `npm run start`'s
          # expected layout.
      - name: Start server and run Playwright
        run: |
          npm run start &
          SERVER_PID=$!
          # Wait for server to respond (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          npx playwright test e2e/auth.spec.ts e2e/smoke.spec.ts e2e/demo-public.spec.ts e2e/demo-founder-view.spec.ts e2e/onboarding-banner-smoke.spec.ts
          # C-0300 sentinel — runs ONLY the "baselines committed" test
          # inside demo-screenshot.spec.ts (filesystem check, no page
          # fixture, no baseline comparison). The other three tests in
          # that file are excluded by --grep until baseline PNGs land.
          # When the sentinel fails, CI fails — the spec can no longer
          # sit dormant with no enforcement that baselines will land.
          npx playwright test e2e/demo-screenshot.spec.ts --grep "C-0300 sentinel"
          # v0.17.1.18: belt + suspenders + nuclear port-3000 cleanup.
          # The v0.17.1.15 attempt (lsof + 5s poll) was insufficient — CI
          # confirmed (PR #98 run #320) that the next-server grandchild
          # was still binding port 3000 when the seed-gated step's WR-04
          # guard ran. Layer multiple methods so any one of them catches
          # the listener regardless of process model.
          echo "[port-cleanup] before: $(lsof -ti:3000 2>/dev/null | tr '\n' ' ')"
          kill -TERM $SERVER_PID 2>/dev/null || true
          # Kill the children of the npm parent (catches the next start
          # intermediary that npm spawns).
          pkill -TERM -P $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          # Kill anything matching next-server (catches the grandchild
          # whose parent is now init, not visible from $SERVER_PID tree).
          # Scope to current user — `pkill -f` is otherwise host-wide and
          # would target sibling jobs on shared/self-hosted runners. The
          # `id -u` resolves at runtime in the runner shell; no external
          # input flows in here.
          _RUNNER_UID=$(id -u)
          pkill -KILL -u "$_RUNNER_UID" -f "next-server" 2>/dev/null || true
          pkill -KILL -u "$_RUNNER_UID" -f "next start" 2>/dev/null || true
          # Final fallback: kill anything bound to port 3000.
          lsof -ti:3000 2>/dev/null | xargs -r kill -9 2>/dev/null || true
          # Kernel-level port nuke (works even when no PID is visible).
          fuser -k 3000/tcp 2>/dev/null || true
          # Poll up to 10s for both ss and lsof to agree port is free.
          # The WR-04 guard checks BOTH so the cleanup must satisfy both.
          for i in $(seq 1 10); do
            ss_bound=$(ss -ltn 2>/dev/null | grep -q ':3000\b' && echo y || echo n)
            lsof_bound=$(lsof -nP -iTCP:3000 -sTCP:LISTEN 2>/dev/null | grep -q LISTEN && echo y || echo n)
            if [ "$ss_bound" = n ] && [ "$lsof_bound" = n ]; then
              echo "[port-cleanup] released after ${i}s"
              break
            fi
            # Re-nuke each iteration in case a respawn loop is active.
            lsof -ti:3000 2>/dev/null | xargs -r kill -9 2>/dev/null || true
            sleep 1
          done
          echo "[port-cleanup] after: $(lsof -ti:3000 2>/dev/null | tr '\n' ' '),ss:$(ss -ltn 2>/dev/null | grep ':3000\b' || echo none)"
        env:
          # C-0293(c): runtime env mirrors the placeholder build above.
          # The unconditional spec set (auth, smoke, demo-public,
          # demo-founder-view, onboarding-banner-smoke) does NOT
          # authenticate against a real Supabase — placeholder is
          # correct here. The seed-gated step below uses real env
          # against a separately-rebuilt `.next/` (never uploaded).
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role
          ADMIN_EMAIL: test@example.com
          PLATFORM_NAME: Quantalyze
          PLATFORM_EMAIL: test@quantalyze.com
      # Plan 11-07 / BLOCK-3: gated step runs the full onboarding-funnel
      # spec against a dedicated test Supabase project. Gate uses the repo
      # VARIABLE `E2E_TEST_DB_CONFIGURED` (NOT `secrets.X != ''`) — vars
      # are exposed in PR contexts so a typo in the variable name surfaces
      # in the workflow log. A `secrets.X != ''` gate would mask typos
      # behind redaction and silently disable the spec. See nightly.yml:17
      # for the analogous precedent. When the variable is unset (fork PRs,
      # repos without test-DB setup), the seed + spec steps skip silently.
      # CI speedup PR-A v0.22.1.0+: the build above is now seed-aware via
      # ternary expressions, so the previously-duplicated test-env build was
      # removed (saved 60-120s per seed-gated run).
      - name: Seed demo data into test Supabase (gated on vars.E2E_TEST_DB_CONFIGURED)
        # Populates the 8-strategy demo set the seed-gated specs require.
        # Defense-in-depth against running this against prod by accident:
        # the SEED_CONFIRM_STAGING interlock + the script's prod-URL probe
        # both fail loudly if a secret is misrouted.
        if: ${{ vars.E2E_TEST_DB_CONFIGURED == 'true' }}
        run: SEED_CONFIRM_STAGING=true npx tsx scripts/seed-demo-data.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      # retro-PR179-M-cache: restore .next/cache (Next.js incremental
      # webpack/Turbopack store) for the seed-gated rebuild. The
      # downloaded nextjs-build artifact excludes .next/cache/** (see
      # frontend-build upload step), and the e2e job previously had no
      # actions/cache restore — so the rebuild's "incremental on top
      # of the placeholder run" promise (in the comment below) was
      # factually false. The rebuild was running cold (~47-50s observed
      # across 4 post-merge runs vs the 30-60s stated range, at the
      # upper bound).
      #
      # Restore from the SAME cache key as frontend-build:Cache .next/cache
      # (read-only restore from the e2e side; frontend-build is the
      # writer). Cache buckets keyed on hashFiles(...) are content-
      # addressed, so the prefix-only restore-keys fallback handles the
      # case where frontend-build's cache step hashed src/** to a
      # different bucket than this e2e job sees.
      - name: Restore .next/cache for rebuild (read-only)
        if: ${{ vars.E2E_TEST_DB_CONFIGURED == 'true' }}
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'next.config.*', 'tsconfig.json', 'tailwind.config.*', 'postcss.config.*') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'next.config.*', 'tsconfig.json', 'tailwind.config.*', 'postcss.config.*') }}-
      - name: Rebuild Next.js with real test-Supabase env (C-0293(c))
        # The artifact downloaded above was built with PLACEHOLDER
        # NEXT_PUBLIC_* values so the uploaded `.next/**` artifact never
        # contains the test-Supabase URL/anon key. The seed-gated specs
        # (onboarding-funnel, discovery, strategy-v2) need the real
        # URL/anon key INLINED into the browser bundle (Next.js
        # evaluates NEXT_PUBLIC_* at build time, not runtime), so we
        # rebuild locally in this job with the real env. This rebuilt
        # `.next/` stays on the runner FS — it is NEVER uploaded as
        # an artifact, so the test-DB credentials never leave the
        # ephemeral runner.
        #
        # Cost: ~30-60s only when E2E_TEST_DB_CONFIGURED == 'true'.
        # For fork PRs and repos without the test-DB wired, this step
        # skips entirely. On a warm cache (frontend-build wrote .next/cache
        # on the same lockfile+config+src hash), the rebuild becomes
        # genuinely incremental — the previous "incremental" comment
        # was aspirational because .next/cache was not restored. With
        # the restore step above the comment now matches observed
        # behavior.
        if: ${{ vars.E2E_TEST_DB_CONFIGURED == 'true' }}
        run: |
          # Wipe the placeholder-built artifact manifests + chunks so
          # the rebuild has nothing stale to merge against. We leave
          # .next/cache (restored above by actions/cache/restore) so
          # the rebuild can re-use the per-module webpack cache from
          # the placeholder run — DefinePlugin re-bakes the NEXT_PUBLIC_*
          # literals on the second pass, the rest is incremental.
          rm -rf .next/server .next/static .next/build-manifest.json .next/prerender-manifest.json .next/required-server-files.json 2>/dev/null || true
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_EMAIL: test@example.com
          PLATFORM_NAME: Quantalyze
          PLATFORM_EMAIL: test@quantalyze.com
      # retro-PR188-D4 (pr-test-analyzer #36, HIGH/8): assert the rebuild
      # actually produced a bundle inlined with the REAL test-Supabase
      # URL. If the `rm -rf` list above ever drifts (Next.js emits a new
      # manifest that overrides static at runtime) the build could
      # short-circuit silently, the seed-gated specs would self-skip via
      # HAS_SEED_ENV checks, and CI would still report green — but the
      # seed-gated spec coverage would be a no-op. The grep is read-only,
      # touches only the local FS (the rebuilt `.next/` is never
      # uploaded), and uses the secret only via the variable expansion
      # GitHub Actions already redacts in logs. The exit code IS the
      # signal: zero hits = build did not inline = fail.
      - name: Verify rebuild inlined real test-Supabase URL
        if: ${{ vars.E2E_TEST_DB_CONFIGURED == 'true' }}
        env:
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
        run: |
          if [ -z "$TEST_SUPABASE_URL" ]; then
            echo "::error::TEST_SUPABASE_URL empty — seed-gated step ran without secret"
            exit 1
          fi
          # Strip the scheme so a partial match (host only) still works.
          host="${TEST_SUPABASE_URL#https://}"
          host="${host#http://}"
          if ! grep -r -l --include='*.js' --include='*.json' "$host" .next/static .next/server > /dev/null 2>&1; then
            echo "::error::Rebuild did not inline TEST_SUPABASE_URL into .next/static or .next/server — seed-gated specs would run against placeholder bundle"
            exit 1
          fi
          echo "Rebuild inlined real test-Supabase URL into .next/ — proceeding to seed-gated specs."
      - name: Run seed-gated specs (MA-8 / BLOCK-3 gated on vars.E2E_TEST_DB_CONFIGURED)
        if: ${{ vars.E2E_TEST_DB_CONFIGURED == 'true' }}
        run: |
          # Phase 11 review fix WR-04: defense-in-depth port-bind guard.
          # The previous unconditional smoke step kills+waits its own server,
          # but if a stale process from earlier in the runner had not yet
          # released port 3000, `npm run start &` would silently fail to
          # bind and the readiness loop below would time out. Surface that
          # explicitly so the step fails fast rather than appearing green
          # while the spec spins on a stale build.
          if ss -ltn 2>/dev/null | grep -q ':3000\b' \
            || lsof -nP -iTCP:3000 -sTCP:LISTEN 2>/dev/null | grep -q LISTEN; then
            echo "Port 3000 still bound after the previous step — failing fast." >&2
            exit 1
          fi
          npm run start &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          # MA-8: every seed-gated spec runs together so wiring the
          # E2E_TEST_DB_CONFIGURED variable surfaces all of them at once.
          # Each spec self-skips when HAS_SEED_ENV is false; with the
          # variable set the gate above resolves to true → seeded run.
          # Adding/removing a seed-gated spec? Update both this list and
          # the e2e/<spec>.spec.ts HAS_SEED_ENV constant.
          npx playwright test \
            e2e/onboarding-funnel.spec.ts \
            e2e/discovery-axe.spec.ts \
            e2e/discovery-hide-examples-default.spec.ts \
            e2e/discovery-prefs-isolation.spec.ts \
            e2e/strategy-v2-partial-data.spec.ts \
            e2e/strategy-v2-chart-parity.spec.ts \
            e2e/strategy-v2-keyboard.spec.ts \
            e2e/strategy-v2-axe.spec.ts \
            --timeout 60000
          # Same kill+wait+nuke pattern as the unconditional step above so any
          # follow-up runner work (artifact upload) doesn't race on resources.
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          lsof -ti:3000 2>/dev/null | xargs -r kill -9 2>/dev/null || true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_EMAIL: test@example.com
          PLATFORM_NAME: Quantalyze
          PLATFORM_EMAIL: test@quantalyze.com
      # retro-PR179-H1 / C-0293(c) extension: skip the playwright-report
      # upload on the SEED-GATED code path. When E2E_TEST_DB_CONFIGURED is
      # 'true', a failed run could be against the REAL-env rebuild (see
      # the "Rebuild Next.js with real test-Supabase env" step above),
      # and Playwright's trace.zip + on-failure screenshots embed
      # NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY from
      # the rebuilt bundle's .next/static/chunks/*.js it captured. The
      # uploaded artifact would then sit in actions storage for 7 days
      # with actions:read scope — re-opening the same exfil pivot path
      # the C-0293(c) artifact-leak fix closed for nextjs-build.
      #
      # The unconditional spec set (auth/smoke/demo-public/demo-founder-view)
      # runs against the PLACEHOLDER artifact and is safe to upload; we
      # cannot easily distinguish which spec failed at this step, so we
      # take the conservative cut: when the seed-gated path is wired,
      # skip the upload entirely. Recovery: re-run locally with
      # PWDEBUG=1 + the test-DB env in the developer's shell.
      #
      # retro-PR188-F6 (red-team #37, HIGH/8): the prior gate was
      # `!= 'true'` (fail-OPEN). Any non-`'true'` value — case mismatch
      # ('True', 'TRUE'), '1', 'yes', a workflow_dispatch typo'd
      # `'false'` — would fire the upload while the upstream rebuild
      # step's `== 'true'` check might still treat the same value as
      # truthy (GH expressions are case-sensitive for == but the
      # operator skew amplifies any typo). Tighten to an EXPLICIT
      # allow-list: upload ONLY when the variable is empty or the
      # literal string 'false'. Every other value (including the
      # documented 'true') keeps the artifact off the runner.
      - name: Upload Playwright report on failure
        if: failure() && (vars.E2E_TEST_DB_CONFIGURED == '' || vars.E2E_TEST_DB_CONFIGURED == 'false')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
