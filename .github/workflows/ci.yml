name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual one-shot triggers for re-baking e2e screenshot baselines. Inert for
  # normal CI (push/PR) — both inputs default false and only change the e2e
  # job's behaviour when explicitly checked on a dispatch. Must live on the
  # default branch for `gh workflow run` / the UI to see them.
  workflow_dispatch:
    inputs:
      bake_svg_goldens:
        description: >-
          Bake e2e/svg-chart-parity.spec.ts goldens: the seeded e2e job runs
          ONLY that spec with --update-snapshots and uploads the generated PNGs
          as an artifact for per-chart human review. Never auto-commits them.
        type: boolean
        default: false
        required: false
      bake_demo_screenshots:
        description: >-
          Bake e2e/demo-screenshot.spec.ts baselines: the placeholder-env e2e
          step runs ONLY that spec with --update-snapshots and uploads the
          regenerated PNGs as an artifact for per-shot human review. Never
          auto-commits them.
        type: boolean
        default: false
        required: false

# Cancel in-flight CI on PR force-pushes only. On `push` to `main`, every
# commit must produce its own recorded green CI run (deploy automation +
# branch protection key on per-SHA status); cancelling intermediate runs
# would leave `main` commits without a green check. `head_ref` is set on
# pull_request events and empty on push events — falling back to `run_id`
# (unique per run) ensures push events never share a group key, so they
# never cancel each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# C-0293(a) fix: minimal default GITHUB_TOKEN scope. Without this block,
# GITHUB_TOKEN inherits the repo default (which is `contents: write` plus
# write on issues/packages/PRs/statuses), so a compromised third-party
# action would have a write-all credential to pivot from. We default to
# `contents: read` (enough for actions/checkout to fetch the tree) and
# uplift specific jobs that genuinely need more (secret-scan grants
# pull-requests: write so gitleaks can post finding comments). The
# release/migration paths live in other workflows that gate on the
# `production` GitHub environment + manual approval.
permissions:
  contents: read

jobs:
  # CI speed audit F1: populate the shared node_modules cache ONCE per lockfile
  # so the frontend jobs (which restore it read-only) skip their installs on
  # subsequent runs. The cache/save is an explicit step AFTER npm ci, so a
  # failed install never saves a partial (poisoned) tree. No downstream job
  # `needs:` this — they restore opportunistically and fall back to their own
  # npm ci on a miss, so this never serializes the graph (and is not a gate).
  deps-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Restore node_modules
        id: node_modules_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: npm ci (cache miss; retry transient network failures)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci --prefer-offline --no-audit --no-fund; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      # Save ONLY on a miss + AFTER a successful npm ci — this step does not run
      # if the install above failed (steps halt on first failure), so the cached
      # tree is always complete.
      - name: Save node_modules
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}

  # CI speedup PR-B (v0.22.1.2+): the prior monolithic `frontend` job ran
  # typecheck → lint → test → policy-checks → audit → build serially
  # (~5min wall clock). Split into 5 parallel jobs so wall-clock collapses
  # to max-of-jobs (~build, ~3min). Each parallel job pays the cold
  # `npm ci` cost (~30-60s), but `actions/setup-node@v4 cache: npm`
  # restores `~/.npm` so subsequent `npm ci`s are tarball-extract-only.
  # Branch protection still gates on a single check (the aggregator
  # `frontend` job below `needs:` all parallel jobs).
  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. No subsequent step in
          # this job pushes back to the repo; the cred is pure attack
          # surface for any third-party action that lands later.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      # CI speed audit F1: restore the shared node_modules cache (keyed on the
      # lockfile) so most runs skip the ~40-60s install. The `deps-cache` job
      # populates it from a clean, SUCCESSFUL npm ci; this is restore-ONLY so a
      # failed install here can never poison the shared cache. On a miss (new
      # lockfile, or deps-cache not finished yet) fall back to a retried npm ci
      # (flakiness audit F3 — transient ECONNRESET; no untrusted input).
      - name: Restore node_modules
        id: node_modules_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: npm ci (cache miss; retry transient network failures)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci --prefer-offline --no-audit --no-fund; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      # PR-C: cache TypeScript's incremental build info (tsconfig.json has
      # `incremental: true`, so tsc emits tsconfig.tsbuildinfo in the project
      # root). On unchanged code, tsc skips fully re-checking files whose
      # imports haven't changed since the last successful run — typecheck
      # drops 30-60% on small diffs.
      - name: Cache tsconfig.tsbuildinfo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: tsconfig.tsbuildinfo
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('package-lock.json', 'tsconfig.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-${{ hashFiles('package-lock.json', 'tsconfig.json') }}-
      - run: npm run typecheck

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. No subsequent step in
          # this job pushes back to the repo; the cred is pure attack
          # surface for any third-party action that lands later.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      # CI speed audit F1: restore the shared node_modules cache (keyed on the
      # lockfile) so most runs skip the ~40-60s install. The `deps-cache` job
      # populates it from a clean, SUCCESSFUL npm ci; this is restore-ONLY so a
      # failed install here can never poison the shared cache. On a miss (new
      # lockfile, or deps-cache not finished yet) fall back to a retried npm ci
      # (flakiness audit F3 — transient ECONNRESET; no untrusted input).
      - name: Restore node_modules
        id: node_modules_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: npm ci (cache miss; retry transient network failures)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci --prefer-offline --no-audit --no-fund; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      # PR-C: cache ESLint's per-file result cache. The `lint` script in
      # package.json now passes `--cache --cache-location
      # node_modules/.cache/.eslintcache`. ESLint skips re-linting files
      # whose mtime + content hash haven't changed since the last run —
      # repeat lint on unchanged files drops to milliseconds.
      - name: Cache ESLint
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules/.cache/.eslintcache
          key: ${{ runner.os }}-eslintcache-${{ hashFiles('package-lock.json', 'eslint.config.*', '.eslintrc*') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-eslintcache-${{ hashFiles('package-lock.json', 'eslint.config.*', '.eslintrc*') }}-
      - run: npm run lint

  frontend-test:
    # PR-C extension: shard vitest. Wall clock collapses to the slowest shard.
    # CI speed audit F6: reduced 3→2 shards — with F1's shared node_modules
    # cache the per-shard install overhead is gone, and the measured per-shard
    # execution (minus install) is well under the critical path, so 2 balanced
    # shards halve the runner fan-out without lengthening wall-clock. Also
    # cache vitest's transform graph at node_modules/.vite — on a warm
    # cache the TS/JSX transform step is largely a no-op.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # fetch-depth: 0 — the phase-29/30 frozen-spine guards
          # (src/__tests__/phase-{29,30}-frozen-spine-guards.test.ts) resolve
          # their diff baseline via `git merge-base origin/main HEAD` or a
          # fallback branch-point sha. A shallow (depth-1) clone has neither, so
          # the fail-loud guard (CLAUDE.md Rule 12) throws at module load and
          # crashes the whole shard. Full history makes the baseline resolvable
          # (same pattern as the analytics-deploy-verify checkout below).
          fetch-depth: 0
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. No subsequent step in
          # this job pushes back to the repo; the cred is pure attack
          # surface for any third-party action that lands later.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      # CI speed audit F1: restore the shared node_modules cache (keyed on the
      # lockfile) so most runs skip the ~40-60s install. The `deps-cache` job
      # populates it from a clean, SUCCESSFUL npm ci; this is restore-ONLY so a
      # failed install here can never poison the shared cache. On a miss (new
      # lockfile, or deps-cache not finished yet) fall back to a retried npm ci
      # (flakiness audit F3 — transient ECONNRESET; no untrusted input).
      - name: Restore node_modules
        id: node_modules_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: npm ci (cache miss; retry transient network failures)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci --prefer-offline --no-audit --no-fund; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      # Cache vitest's transform graph. Vite persists per-file TS/JSX
      # transforms here; on a warm cache the transform step is largely a
      # no-op. Key on lockfile + vitest config + the src/tests trees.
      - name: Cache vitest transform (node_modules/.vite)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-vitest-${{ hashFiles('package-lock.json', 'vitest.config.ts') }}-${{ hashFiles('src/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-vitest-${{ hashFiles('package-lock.json', 'vitest.config.ts') }}-
      # CI speed (2026-07-02): the shards now ALSO emit v8 coverage + a blob
      # report, and the frontend-coverage job merges the blobs and enforces
      # the vitest.config.ts thresholds — deleting the duplicate full-suite
      # coverage run (~8m). Threshold flags are ZEROED here because a lone
      # shard sees only half the files and would spuriously fail the ratchet;
      # the merge job is where the real gate fires (locally proven: shard
      # alone FAILS thresholds, merged run passes at the full-suite numbers).
      # --test-timeout=20000 adopts the old coverage job's contention
      # rationale: v8 coverage adds per-worker load, and the documented
      # worker-contention flake (vitest.config.ts:6-16) turns that into
      # spurious 5s timeouts on a busy runner.
      #
      # DO NOT add NEXT_PUBLIC_SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY env to
      # this job: that would un-skip ~284 live-DB tests (src/lib/test-helpers/
      # live-db.ts), shifting the coverage denominator and invalidating the
      # ratchet baseline (which was measured with those tests skipped).
      - name: Run vitest shard ${{ matrix.shard }}/2 (blob + coverage, thresholds deferred to merge)
        run: >-
          npx vitest run --shard=${{ matrix.shard }}/2
          --reporter=dot --reporter=blob
          --coverage --test-timeout=20000
          --coverage.thresholds.lines=0
          --coverage.thresholds.statements=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.branches=0
      - name: Upload blob report for coverage merge
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: .vitest-reports/
          # .vitest-reports is a dot-directory; upload-artifact excludes
          # hidden paths by default (a v4.4+ security change), so without
          # this the step uploads nothing and if-no-files-found fails it.
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  frontend-coverage:
    # tech-debt #11: coverage is a CI GATE (the vitest.config.ts thresholds,
    # ratcheted a few points under measured actual, fail this job on a real
    # regression).
    #
    # CI speed (2026-07-02): this job no longer RE-RUNS the full suite — the
    # frontend-test shards above emit v8 coverage into blob reports, and this
    # job downloads both blobs and replays them with `--merge-reports
    # --coverage`, which merges coverage across shards and enforces the
    # config thresholds on the FULL-suite numbers. Locally proven equivalent:
    # merged coverage matches the old single-run numbers, a lone shard fails
    # the ratchet (so the gate genuinely fires), and the merged run passes.
    # Same job NAME kept so the `frontend` aggregator's needs/result-check
    # wiring is untouched. No tests execute here → shallow checkout is fine
    # (the frozen-spine guards run in the shards, not in a report replay).
    runs-on: ubuntu-latest
    needs:
      - frontend-test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Restore node_modules
        id: node_modules_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: npm ci (cache miss; retry transient network failures)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci --prefer-offline --no-audit --no-fund; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      - name: Download shard blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: vitest-blob-*
          path: .vitest-reports
          merge-multiple: true
      - name: Merge shard reports + enforce coverage thresholds
        run: npx vitest run --merge-reports --coverage

  frontend-policy:
    # Banned-package check + GDPR export coverage. PR-C moved npm audit
    # to the nightly workflow because (a) it's a security signal, not a
    # per-PR functional gate, (b) Dependabot/Snyk already cover the
    # critical-severity surface continuously, and (c) keeping it on the
    # per-PR critical path adds 15-30s with no behavior signal.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. No subsequent step in
          # this job pushes back to the repo; the cred is pure attack
          # surface for any third-party action that lands later.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      # CI speed audit F1: restore the shared node_modules cache (keyed on the
      # lockfile) so most runs skip the ~40-60s install. The `deps-cache` job
      # populates it from a clean, SUCCESSFUL npm ci; this is restore-ONLY so a
      # failed install here can never poison the shared cache. On a miss (new
      # lockfile, or deps-cache not finished yet) fall back to a retried npm ci
      # (flakiness audit F3 — transient ECONNRESET; no untrusted input).
      - name: Restore node_modules
        id: node_modules_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: npm ci (cache miss; retry transient network failures)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci --prefer-offline --no-audit --no-fund; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      - name: Check for banned packages (supply-chain)
        run: node scripts/check-banned-packages.mjs
      # Phase 20 / T16 — the recording MT5 EA is READ-ONLY by CI invariant.
      # An EA with account access is a Tampering/Elevation risk, so we FAIL the
      # build on ANY trade-mutation token in tools/mt5 source. This is the M4
      # red-team HARDENING of the original denylist, which scanned only top-level
      # *.mq5 and missed the two most common ways an MQL5 EA actually places a
      # trade. The check now covers, scanning BOTH *.mq5 AND included *.mqh
      # headers RECURSIVELY (grep -r descends subdirs):
      #   - the low-level / declaration surface:
      #       OrderSend, OrderSendAsync, OrderModify, OrderDelete,
      #       PositionClose, PositionModify, the CTrade class, and `trade.`
      #   - the CTrade METHOD-CALL surface (a CTrade instance named ANYTHING,
      #     not just `trade`, calling): .Buy( .Sell( .BuyStop( .SellStop(
      #       .BuyLimit( .SellLimit( .PositionOpen( .PositionClose(
      #       .PositionClosePartial( .PositionReverse( .OrderOpen(
      # Pure grep, like the banned-packages step — NO new dependency.
      #
      # KNOWN RESIDUAL LIMIT (documented, not defeated): grep is line-literal, so
      # a token inside a COMMENT (e.g. `// OrderSend disabled`) trips a SAFE-SIDE
      # false positive, and deliberate in-comment whitespace/identifier evasion is
      # not caught by a static grep. That residual is accepted: the manual T14
      # demo-reconcile is the runtime backstop, and a false positive merely forces
      # a human to confirm the EA is read-only (fail-safe direction).
      - name: MT5 EA read-only static check
        run: |
          # Low-level / declaration surface + CTrade method-call surface.
          DENY_LOWLEVEL='OrderSend|OrderSendAsync|OrderModify|OrderDelete|CTrade|PositionClose|PositionModify|trade\.'
          DENY_METHODS='\.(Buy|Sell|BuyStop|SellStop|BuyLimit|SellLimit|PositionOpen|PositionClose|PositionClosePartial|PositionReverse|OrderOpen)[[:space:]]*\('

          if [ ! -d tools/mt5 ]; then
            echo "MT5 EA static check: tools/mt5 absent — nothing to scan."
            exit 0
          fi

          # grep -r exits 1 on no-match; under the runner's `set -e` that would
          # abort the step at the assignment, so we neutralize it with `|| true`
          # and derive the verdict from whether any line was captured — NOT from
          # grep's own exit code (a no-match must be a PASS, only a positive
          # denylist match is a FAIL). `grep -rnE` reports file:line for the log.
          MATCHES=$(grep -rnE --include='*.mq5' --include='*.mqh' \
            -e "$DENY_LOWLEVEL" -e "$DENY_METHODS" tools/mt5 || true)

          if [ -n "$MATCHES" ]; then
            echo "::error::MT5 EA must be read-only (no order/trade mutation API). Forbidden token(s) found in tools/mt5:"
            echo "$MATCHES"
            exit 1
          fi
          echo "MT5 EA static check: clean (0 trade-mutation tokens in tools/mt5/**/*.{mq5,mqh})."
      - name: Check GDPR export coverage (Task 7.3)
        run: npx tsx scripts/check-gdpr-export-coverage.ts

  knip:
    # tech-debt #13: non-blocking dead-code report. knip.json declares the
    # real entry points (supabase edge functions, manually-run scripts) so
    # the signal is genuine, not framework false-positives. Scoped to
    # files+dependencies — the actionable, low-false-positive issue types
    # (unused exports/types are noisier and deferred). NON-BLOCKING by design:
    # this job is intentionally NOT in the `frontend` aggregator's `needs:`, so
    # it never gates a merge; it surfaces NEW unused files/deps in the run
    # summary so the dead-code drift this finding cleaned up cannot silently
    # re-accumulate. Promote to a gate once the exports/types baseline is zero.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Restore node_modules
        id: node_modules_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: npm ci (cache miss; retry transient network failures)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci --prefer-offline --no-audit --no-fund; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      - name: knip dead-code report (non-blocking)
        run: |
          # `|| true` keeps this step (and the job) green regardless of
          # findings — this is a REPORT, not a gate (tech-debt #13, the
          # user-chosen non-blocking posture). knip exits non-zero when it
          # finds issues and the runner shell has pipefail on, so we capture
          # to a file and derive the summary from its contents, not the code.
          npx knip --include files,dependencies --reporter compact > knip.out 2>&1 || true
          if [ -s knip.out ]; then
            {
              echo "## knip — unused files / dependencies (non-blocking)"
              echo ""
              echo '```'
              cat knip.out
              echo '```'
              echo ""
              echo "tech-debt #13: declare the real entry point in knip.json, or delete the dead code."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::knip found unused files/dependencies — see the job summary (non-blocking)."
          else
            echo "## knip ✅ no unused files or dependencies" >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend-build:
    # The build is the longest single step. It runs in parallel with the
    # other frontend-* jobs (above) and uploads the .next + public output
    # as an artifact so the e2e job can download instead of rebuilding —
    # eliminating the duplicate ~60-120s build that used to live in e2e.
    #
    # C-0293(c) artifact-leak fix: this job builds with PLACEHOLDER
    # NEXT_PUBLIC_SUPABASE_* env values UNCONDITIONALLY (no longer the
    # seed-aware ternary). The previous behavior baked the real
    # TEST_SUPABASE_URL + TEST_SUPABASE_ANON_KEY into the client bundles
    # in `.next/**` whenever vars.E2E_TEST_DB_CONFIGURED was true, then
    # uploaded that artifact (where any third-party action in the same
    # workflow run has `actions: read` and could grep for inlined creds).
    # The seed-gated e2e specs now rebuild locally inside the e2e job
    # with the real env, and that rebuilt `.next/` stays on the runner
    # FS — it is never uploaded as an artifact.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. No subsequent step in
          # this job pushes back to the repo; the cred is pure attack
          # surface for any third-party action that lands later.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      # CI speed audit F1: restore the shared node_modules cache (keyed on the
      # lockfile) so most runs skip the ~40-60s install. The `deps-cache` job
      # populates it from a clean, SUCCESSFUL npm ci; this is restore-ONLY so a
      # failed install here can never poison the shared cache. On a miss (new
      # lockfile, or deps-cache not finished yet) fall back to a retried npm ci
      # (flakiness audit F3 — transient ECONNRESET; no untrusted input).
      - name: Restore node_modules
        id: node_modules_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: npm ci (cache miss; retry transient network failures)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci --prefer-offline --no-audit --no-fund; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      # Cache .next/cache (Next.js incremental webpack/Turbopack output) keyed
      # on every input that changes how the bundle compiles: lockfile,
      # next.config, tailwind/postcss config, tsconfig, and the full src
      # tree (any extension). The wide src glob catches CSS, MDX, JSON,
      # locale files etc. that a `.ts/.tsx` glob would silently miss —
      # missing them means a config change ships against a stale cache.
      # restore-keys ladder is intentionally short: only fall back to a
      # lockfile-matched cache, never to a "different lockfile" prefix
      # (cross-Next-version cache restore is a known hazard).
      - name: Cache .next/cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'next.config.*', 'tsconfig.json', 'tailwind.config.*', 'postcss.config.*') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'next.config.*', 'tsconfig.json', 'tailwind.config.*', 'postcss.config.*') }}-
      # C-0293(c): build with PLACEHOLDERS unconditionally. The previous
      # seed-aware ternary leaked test-DB credentials into the uploaded
      # artifact (see the security comment on this job header above).
      # The seed-gated e2e specs rebuild locally with the real env in
      # the e2e job, and that rebuilt `.next/` is never uploaded.
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role
          ADMIN_EMAIL: test@example.com
          PLATFORM_NAME: Quantalyze
          PLATFORM_EMAIL: test@quantalyze.com
      # Upload the build output for the e2e job to download. Exclude
      # .next/cache (the actions/cache above already persists it across
      # runs; including it here would inflate every per-run artifact by
      # 100MB+ for no e2e benefit). upload-artifact@v4 negative globs
      # only exclude entries that actually match the negative pattern,
      # so the directory match must use `/**` to recurse — `!.next/cache`
      # alone only excludes the directory entry, not its contents.
      - name: Upload .next + public artifact for e2e
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: nextjs-build
          path: |
            .next/**
            !.next/cache/**
            public/**
          retention-days: 1
          if-no-files-found: error
          # Critical: upload-artifact@v4 defaults `include-hidden-files: false`,
          # which excludes any path starting with `.` — `.next` is dotfile-
          # prefixed so the action silently uploaded only `public/**` (6 files,
          # 60KB total) when this was missing. The e2e job's `next start` then
          # crashed with "Could not find a production build in the '.next'
          # directory" because the artifact carried no .next at all.
          include-hidden-files: true

  frontend:
    # Aggregator. Branch protection gates on this single required check;
    # `needs:` enforces that every parallel frontend-* job above passed.
    # `if: always()` + the explicit result-check below is critical: a bare
    # `needs:` chain marks the aggregator as `skipped` (not `failed`) when
    # any upstream fails, and `skipped` checks can satisfy classic GitHub
    # branch protection rules — silently letting broken code merge. The
    # explicit `exit 1` on any non-success forces a definite `failure`
    # status that all branch-protection configurations honor.
    #
    # CI speed (2026-07-02, user decision): `lighthouse-mobile` was REMOVED
    # from this gate (Phase 48-05 / A11Y-03 had wired it into BOTH `needs`
    # and the result-check loop). After coverage folded into the test shards,
    # the perf-budget job was the aggregator's slowest dependency (~+2m on
    # every merge) and its noisiest signal. It is now ADVISORY like e2e: it
    # still runs on every PR and reports its own check — it just no longer
    # blocks this aggregator.
    #
    # Phase 126 / FACTSHEET-02 (2026-07-19): the seed-gated `e2e-seeded` job
    # is now BLOCKING here -- the sfox-badge legs are the go-live gate and
    # were advisory before. It self-skips when `E2E_TEST_DB_CONFIGURED` is
    # unset (fork PRs / repos without test-DB setup), so `skipped` is
    # tolerated FOR THE e2e-seeded ROW ONLY in the loop below; on the main
    # repo the variable is set, the job runs, and a real `failure` reddens
    # this required check. All other rows stay strict (any non-success fails).
    runs-on: ubuntu-latest
    needs:
      - frontend-typecheck
      - frontend-lint
      - frontend-test
      - frontend-coverage
      - frontend-policy
      - frontend-build
      - e2e-seeded
    if: always()
    steps:
      - name: Verify all frontend-* jobs succeeded
        run: |
          fail=0
          for r in \
            "frontend-typecheck=${{ needs.frontend-typecheck.result }}" \
            "frontend-lint=${{ needs.frontend-lint.result }}" \
            "frontend-test=${{ needs.frontend-test.result }}" \
            "frontend-coverage=${{ needs.frontend-coverage.result }}" \
            "frontend-policy=${{ needs.frontend-policy.result }}" \
            "frontend-build=${{ needs.frontend-build.result }}" \
            "e2e-seeded=${{ needs.e2e-seeded.result }}"; do
            name="${r%=*}"; result="${r#*=}"
            echo "$name: $result"
            if [ "$name" = "e2e-seeded" ]; then
              # Phase 126 / FACTSHEET-02 + RT-01 canary: e2e-seeded is BLOCKING
              # (the sfox-badge legs are the go-live gate). It legitimately
              # self-skips ONLY on a FORK PR — a different head repo has no
              # access to the test-DB variable. On a push to main OR a same-repo
              # PR, a `skipped` result means E2E_TEST_DB_CONFIGURED was LOST
              # (which ALSO silently disables sql-tests), so a skip there is NOT
              # tolerated: the gate must redden rather than green-wash an
              # untested go-live badge (RT-01 red-team H4 — the #1 silent-green).
              is_fork_pr='${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}'
              if [ "$result" = "success" ]; then
                :
              elif [ "$result" = "skipped" ] && [ "$is_fork_pr" = "true" ]; then
                echo "e2e-seeded skipped (fork PR — no test-DB access); tolerated for this row only."
              else
                echo "::error::e2e-seeded result=$result on a TRUSTED event (push/same-repo). The go-live badge gate MUST run here — E2E_TEST_DB_CONFIGURED may be unset (this also disables sql-tests). A skip is not tolerated."
                fail=1
              fi
            elif [ "$result" != "success" ]; then
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "::error::One or more frontend-* jobs did not succeed."
            exit 1
          fi
          echo "All frontend-* jobs succeeded."

  sql-tests:
    # audit-2026-05-07 follow-up Issue 6 — wire the supabase/tests/test_*.sql
    # files into CI. Pre-fix, the 5 plain PL/pgSQL test files were
    # committed but never invoked by any workflow or `package.json`
    # script — covering P911-P920, P917, P918, P919, P920, P455, P475
    # with no CI signal. A future migration could silently break the
    # sanitize_user sentinel trigger, the retention guard, the data
    # deletion FK action, the log_audit_event_service ceiling, or the
    # wizard draft guard with no test failure to catch it.
    #
    # Security (audit-2026-05-07 red-team Finding 6): TWO defenses:
    #
    #   1. Fork-author gate. Forked-PR runs MUST NOT receive
    #      TEST_SUPABASE_DB_URL — GitHub's default secret policy blocks
    #      it for fork PRs, but we also explicitly check
    #      github.event.pull_request.head.repo.full_name. Defense in
    #      depth means an internal-branch PR with a typo'd vars setting
    #      can't accidentally let a fork PR through.
    #
    #   2. Meta-command filter. Even with the gate, a malicious internal
    #      PR could commit a test file containing psql meta-commands
    #      (\!, \copy, \o, \COPY) that exfiltrate secrets from the
    #      runner. We grep each test file before psql -f and bail with
    #      an explicit error if any of those tokens appear. This is a
    #      file-content check; the env: injection still keeps the secret
    #      out of any run: shell-substitution surface.
    #
    # The if: gate composes both: fork PRs are blocked AND the
    # E2E_TEST_DB_CONFIGURED variable must be set. No untrusted
    # github.event.* content flows into any run: step — every reference
    # to a github.event.* value sits in YAML expressions evaluated at
    # workflow-parse time, never in shell substitution.
    #
    # Gating: same `vars.E2E_TEST_DB_CONFIGURED` pattern as the e2e job.
    # When the variable is unset (forks, repos without test-DB setup),
    # the job no-ops. Postgres connection string comes from
    # `secrets.TEST_SUPABASE_DB_URL` — a separate secret from the
    # PostgREST/HTTP-shaped TEST_SUPABASE_URL because psql speaks the
    # raw Postgres wire protocol (port 5432/6543 via pooler) rather than
    # the HTTPS REST API. If TEST_SUPABASE_DB_URL is not yet wired, the
    # step fails explicitly so the gate flips from "silent" to "loud
    # follow-up to provision the secret".
    #
    # The test files use plain `RAISE EXCEPTION` (no pgTAP) — under
    # `psql -v ON_ERROR_STOP=1` a failed assertion exits non-zero and
    # fails the job.
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && vars.E2E_TEST_DB_CONFIGURED == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. The sql-tests job
          # consumes TEST_SUPABASE_DB_URL but does no git ops; the
          # persisted cred is pure attack surface.
          persist-credentials: false
      - name: Install psql client
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Preflight - reject psql meta-commands in test files (Finding 6)
        # Reject any test file containing psql meta-commands that could
        # exfiltrate secrets from the runner. Specifically:
        #   \!       — shell escape (executes any shell command, can
        #              read env vars / curl them out)
        #   \copy    — client-side file IO (can read /etc/passwd,
        #              the workflow's environment dumps, etc.)
        #   \o ...   — redirect query output to a file (can persist
        #              secrets into an artifact)
        #   \COPY    — upper-case form of \copy
        # All four are PSQL CLIENT-side; the server's check_function
        # cannot help. We refuse them at the file level.
        #
        # We deliberately use plain grep (no -P) so the patterns are
        # ERE-portable, and \\! requires single-quoting to keep the
        # backslash literal through the shell.
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(supabase/tests/test_*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No supabase/tests/test_*.sql files to scan."
            exit 0
          fi
          bad=0
          for f in "${files[@]}"; do
            # Each pattern is its own grep so the error message can name
            # the exact meta-command that triggered the reject.
            if grep -nE '^\\\!|^\\!| \\\!| \\!' "$f" >/dev/null 2>&1; then
              echo "::error file=$f::contains '\\!' (shell escape) — refused by Finding 6 preflight"
              bad=1
            fi
            if grep -nE '\\copy\b' "$f" >/dev/null 2>&1; then
              echo "::error file=$f::contains '\\copy' (client file IO) — refused by Finding 6 preflight"
              bad=1
            fi
            if grep -nE '\\COPY\b' "$f" >/dev/null 2>&1; then
              echo "::error file=$f::contains '\\COPY' (client file IO) — refused by Finding 6 preflight"
              bad=1
            fi
            if grep -nE '^\\o |^\\o$| \\o ' "$f" >/dev/null 2>&1; then
              echo "::error file=$f::contains '\\o' (output redirect) — refused by Finding 6 preflight"
              bad=1
            fi
          done
          if [ "$bad" = 1 ]; then
            echo "::error::One or more SQL test files contain a refused psql meta-command."
            exit 1
          fi
          echo "Preflight clean: ${#files[@]} test file(s) free of refused meta-commands."
      - name: Run SQL self-tests against test Supabase project
        env:
          # PG connection string for the test project (qmnijlgmdhviwzwfyzlc).
          # Must be the raw Postgres DSN (postgresql://...), NOT the
          # HTTPS REST URL (TEST_SUPABASE_URL). If the secret is not
          # configured, the step exits with an explicit message rather
          # than silently passing — Issue 6 is specifically about the
          # silent-no-op surface.
          TEST_SUPABASE_DB_URL: ${{ secrets.TEST_SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${TEST_SUPABASE_DB_URL}" ]; then
            echo "::error::TEST_SUPABASE_DB_URL secret is required to run SQL self-tests."
            echo "::error::Set this secret to the raw Postgres DSN for the test Supabase project."
            echo "::error::Format: postgresql://postgres.<project-ref>:<password>@<pooler-host>:6543/postgres"
            exit 1
          fi
          echo "Discovering supabase/tests/test_*.sql files..."
          shopt -s nullglob
          files=(supabase/tests/test_*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::warning::No supabase/tests/test_*.sql files found — Issue 6 invariant drifted."
            exit 0
          fi
          echo "Found ${#files[@]} test file(s):"
          printf '  - %s\n' "${files[@]}"
          # ON_ERROR_STOP=1 + the test files' RAISE EXCEPTION lines mean
          # a failed assertion exits non-zero and fails this step.
          for f in "${files[@]}"; do
            echo ""
            echo "=== Running: $f ==="
            psql "$TEST_SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo ""
          echo "All ${#files[@]} SQL self-tests passed."

  secret-scan:
    # Task 7.6: gitleaks runs against the full commit history for PRs
    # (fetch-depth: 0) and against the pushed commits on main. Config
    # lives in .gitleaks.toml (extends the default ruleset with a
    # narrow allowlist for known test fixtures).
    runs-on: ubuntu-latest
    env:
      # gitleaks-action@v2.3.9 is a Node-20 JS action; GitHub forces JS actions
      # to Node 24 on 2026-06-02 and removes Node 20 on 2026-09-16. The action
      # is a thin wrapper that downloads + runs the gitleaks Go binary, so it
      # runs cleanly on Node 24 — opt in now so the secret-scan job verifies it
      # ahead of the forced switch (and the deprecation warning clears). The
      # latest gitleaks-action release is still v2.3.9/node20, so there is no
      # version bump that fixes this. If a future Node bump ever breaks the
      # action's JS bundle, replace it with the gitleaks binary (the pattern
      # #308 used for lychee: a cached+retried release download + a
      # `gitleaks git . --config .gitleaks.toml --log-opts=<base..head>` range
      # scan — validated locally on this branch's investigation).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    # C-0293(a) per-job uplift: gitleaks-action posts finding summaries
    # as PR comments when a leak is detected (so the author sees the
    # diagnostic without digging into the workflow log). That requires
    # `pull-requests: write`. `contents: read` is inherited from the
    # workflow-level default for checkout. No other scope needed.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          # retro-PR179-M-persist-chain: actions/checkout defaults
          # persist-credentials: true, which writes GITHUB_TOKEN as
          # http.https://github.com/.extraheader in .git/config. With
          # this job's pull-requests: write uplift, a compromised
          # gitleaks-action SHA could read the token from .git/config
          # AND comment on arbitrary PRs. Explicitly drop the cred so
          # the SHA-pin defense isn't undercut by the persisted token.
          # The gitleaks step gets GITHUB_TOKEN via env: below
          # (intentional, scoped read).
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  docs-link-check:
    # Task 7.4: link-check hook on docs/runbooks/soc2-readiness.md (and
    # the rest of docs/**) to keep evidence links honest. Internal links
    # only — external URL breakage should not fail CI because the
    # runbooks reference third-party provider docs whose URLs we do not
    # own. `--offline` resolves file:// and relative paths against the
    # checked-out tree; the no-progress flag keeps CI logs quiet.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. lychee-action only
          # reads the checked-out tree; the persisted cred is pure
          # attack surface for any third-party action that lands later.
          persist-credentials: false
      # CI flakiness audit F4: previously used lycheeverse/lychee-action, which
      # downloads the lychee release binary at job start with a bare `curl`
      # (no retry) — a transient release-CDN error surfaced as `curl exit 22`
      # and failed the whole check, even though the link scan is `--offline`
      # and cannot itself fail on network. We now (a) cache the pinned binary
      # so the download is a one-time cost, and (b) retry the download on a
      # cold cache. Pin keyed on LYCHEE_VERSION so a bump re-downloads.
      - name: Cache lychee binary
        id: lychee-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.lychee-bin
          key: lychee-${{ runner.os }}-v0.23.0
      - name: Install lychee (retry transient download failures)
        if: steps.lychee-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.lychee-bin"
          url="https://github.com/lycheeverse/lychee/releases/download/lychee-v0.23.0/lychee-x86_64-unknown-linux-gnu.tar.gz"
          n=0
          until curl -sSfL "$url" -o /tmp/lychee.tar.gz; do
            n=$((n+1))
            if [ "$n" -ge 4 ]; then echo "lychee download failed after $n attempts"; exit 1; fi
            echo "lychee download attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
          tar -xzf /tmp/lychee.tar.gz -C "$HOME/.lychee-bin" lychee
          chmod +x "$HOME/.lychee-bin/lychee"
      - name: Link-check docs (internal links only)
        run: |
          "$HOME/.lychee-bin/lychee" --offline --no-progress --verbose \
            docs/runbooks/soc2-readiness.md \
            'docs/runbooks/**/*.md'

  python:
    runs-on: ubuntu-latest
    # Serialize the python job across ALL runs (every PR + every push) against
    # the SHARED remote Supabase test project. The workflow-level concurrency
    # group (top of file) only isolates per-PR, so two different PRs' python
    # jobs could hit the shared test DB simultaneously and race the
    # compute_jobs fencing/claim tests (CI flakiness audit F2). A repo-wide
    # group with cancel-in-progress:false QUEUES contending runs instead of
    # running them concurrently — and crucially does NOT cancel in-flight runs,
    # so a push-to-main python job still records its required per-SHA green
    # check (it just waits its turn).
    concurrency:
      group: shared-test-db
      cancel-in-progress: false
    defaults:
      run:
        working-directory: analytics-service
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. The python/pytest job
          # consumes TEST_SUPABASE_* secrets but does no git ops; the
          # persisted cred is pure attack surface.
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          # Include requirements-dev.txt so the test/type deps (pytest, mypy,
          # …) — relocated there — are part of the pip cache key (CI speed
          # audit F4).
          cache-dependency-path: |
            analytics-service/requirements.txt
            analytics-service/requirements-dev.txt
      # Retry pip install on transient index/CDN failures (CI flakiness audit
      # F6). Fixed command; no untrusted input interpolated.
      - name: pip install (retry transient network failures)
        run: |
          n=0
          until pip install -r requirements.txt -r requirements-dev.txt; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "pip install failed after $n attempts"; exit 1; fi
            echo "pip install attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      # @runtime_checkable Protocol only verifies method *presence* at runtime,
      # not signature shape; mypy --strict catches signature drift (e.g.
      # `validate(req)` vs `validate(request)`) at type-check time before the
      # test pipeline. --follow-imports=silent keeps strictness local to the
      # gated packages.
      #
      # B-mypy program: the strict floor started at services/ingestion/ (Phase
      # 19 / BACKBONE-02 / MC-3) and now covers ALL running-service code —
      # services/ (B-mypy part g, v0.24.15.60), routers/ (part h, v0.24.15.61),
      # and models/ (part i) — all verified 0 against the CI-pinned deps
      # (supabase 2.15.1 / postgrest 1.0.2). scripts/ stays ungated: they are
      # one-off operational tooling (backfills, cassette recording), not the
      # running service, and gating them would add a types-PyYAML dev-dep plus
      # friction for throwaway scripts. tests/ stays untyped by design.
      - run: mypy --strict --follow-imports=silent services/ routers/ models/
      # PR #149 v0.22.25.3 follow-up: wire the test Supabase project into
      # the python job so the P97 fence regression tests in
      # tests/test_compute_jobs_fencing.py execute against a real DB. The
      # test project (`qmnijlgmdhviwzwfyzlc`) was caught up to main's
      # migration head (109-119 applied 2026-05-12), so live-DB fixtures
      # no longer hit pre-existing schema drift.
      #
      # Gated on the repository VARIABLE `E2E_TEST_DB_CONFIGURED` (NOT
      # `secrets.X != ''`) — vars are introspectable in workflow logs so
      # a missing/typo'd var fails loudly. When the var is unset (forks,
      # repos without a configured test DB), the secrets fall back to
      # empty strings AND `CI` is demoted to '' so `_need_supabase()` in
      # `tests/test_compute_jobs_fencing.py` falls into the `pytest.skip`
      # branch instead of the CI=true hard-fail branch.
      # tech-debt #16: gate covers services/ + routers/ + main_worker.py
      # (was services/ only — the 7.8k-LOC route layer and the worker
      # entrypoint contributed zero to the only Python coverage gate).
      # Combined measured ~87% clears the 80 floor; exchange/internal/csv
      # routers (32/36/42%) are now inside the denominator so they can no
      # longer regress unseen. Keep byte-identical with Makefile `test:`.
      #
      # SERIAL (v1.9.1 Phase 97): the `-n auto --dist loadgroup` parallelization
      # (absorbed from #610) is DEFERRED. Even with every live-DB module pinned
      # to one `shared_test_db` xdist_group worker, the GLOBAL-claim fence tests
      # (`test_compute_jobs_fencing.py`) flake under `-n auto`: the group's own
      # tests run in a loadgroup-variable order and any imperfect per-test
      # compute_jobs cleanup pollutes a later global-`claim_compute_jobs_with_priority`
      # assertion (tie-break picks a foreign row / `single()` finds 0 rows /
      # the seeded row is claimed out of the batch → None). Main's stable serial
      # order avoids this. The `want_job_id` claim scoping + decoy regression +
      # xdist_group infra all LAND (they are correct and the offline decoy pins
      # the scoping); re-enabling `-n auto` needs per-test claim-space isolation
      # first (TODOS: v1.9.1 Phase-97 parallelization deferral). The cross-run
      # `concurrency: shared-test-db` group above still prevents two runs from
      # contending. Keep byte-identical with Makefile `test:`.
      - run: pytest --cov=services --cov=routers --cov=main_worker --cov-report=term-missing --cov-fail-under=80
        env:
          SUPABASE_TEST_URL: ${{ vars.E2E_TEST_DB_CONFIGURED == 'true' && secrets.TEST_SUPABASE_URL || '' }}
          SUPABASE_TEST_SERVICE_KEY: ${{ vars.E2E_TEST_DB_CONFIGURED == 'true' && secrets.TEST_SUPABASE_SERVICE_ROLE_KEY || '' }}
          CI: ${{ vars.E2E_TEST_DB_CONFIGURED == 'true' && 'true' || '' }}

  e2e:
    # Runs the PUBLIC/smoke Playwright suite against a placeholder-env
    # Next.js build. Scope: auth, smoke, and the public /demo specs
    # (demo-public + demo-founder-view) plus the public sweep specs.
    #
    # CI speed (2026-07-02): the seed-gated batch that used to run
    # SEQUENTIALLY after this one (4.8m after a 6.1m smoke pass) moved to
    # the parallel `e2e-seeded` job below — e2e wall clock drops from ~13m
    # to the slower of the two (~8-9m). This job never sees the real
    # test-Supabase env, so its artifacts are C-0293(c)-safe by
    # construction.
    #
    # demo-screenshot.spec.ts: its chromium-linux baseline PNGs are now
    # committed (generated in the Playwright Linux Docker image), so its 3
    # viewport toHaveScreenshot comparisons run unconditionally in the
    # spec list below (tech-debt #25 — executing the codebase's own
    # documented "once baselines land, drop the --grep gate" next step).
    # The former C-0300 --grep sentinel gate (whose only job was to fail
    # until baselines landed) has been dropped; the sentinel test itself
    # is harmless and still runs as part of the full spec.
    runs-on: ubuntu-latest
    # PR-B: depend on frontend-build (for the artifact) PLUS frontend-typecheck
    # so e2e doesn't burn ~3-5min when a typecheck failure is already known.
    # CI speed audit F2: dropped `frontend-test` from `needs` — e2e validity
    # depends on the build + types, not on unit tests passing, and gating on
    # the slowest test shard (~133s) needlessly delayed the critical-path tail.
    # Don't depend on the aggregator (would also wait on lint/policy). Branch
    # protection still gates merges on the `frontend` aggregator above; this
    # only trades a little wasted runner time on an already-doomed PR for a
    # faster e2e signal on healthy ones.
    needs:
      - frontend-build
      - frontend-typecheck
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config. No subsequent step in
          # this job pushes back to the repo; the cred is pure attack
          # surface for any third-party action that lands later.
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      # CI speed audit F1: restore the shared node_modules cache (keyed on the
      # lockfile) so most runs skip the ~40-60s install. The `deps-cache` job
      # populates it from a clean, SUCCESSFUL npm ci; this is restore-ONLY so a
      # failed install here can never poison the shared cache. On a miss (new
      # lockfile, or deps-cache not finished yet) fall back to a retried npm ci
      # (flakiness audit F3 — transient ECONNRESET; no untrusted input).
      - name: Restore node_modules
        id: node_modules_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: npm ci (cache miss; retry transient network failures)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci --prefer-offline --no-audit --no-fund; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      # Cache the Playwright browser bundle (~120MB chromium) keyed on the
      # `@playwright/test` package version specifically — not the whole
      # lockfile. Keying on lockfile would bust the cache for every
      # unrelated dep update; keying on Playwright's package.json (which
      # `npm ci` materialized in node_modules) means the cache only rolls
      # when Playwright itself changes, which is what determines the
      # browser bundle compatibility.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('node_modules/@playwright/test/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      # On cache hit, skip the install entirely. The chromium browser is
      # restored from the cache; GitHub ubuntu-latest runners have all
      # the system libs chromium needs (libnss3, libgtk-3-0, libgbm1,
      # etc.) baked in. The previous version ran `playwright install-deps
      # chromium` (apt-get update + 30 lib install) on cache hit, which
      # observed 5+ minutes on a slow apt mirror — defeating the cache
      # win. If a future runner image update drops a chromium-required
      # lib, the playwright run will fail with a clear missing-lib error
      # and we add it back. On cache miss, do the full install (download
      # + apt deps).
      - name: Install Playwright (browser bundle from cache when available)
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — chromium bundle restored. Runner image has system libs; skipping apt install."
          else
            npx playwright install --with-deps chromium
          fi
      # PR-B: Download the build artifact from frontend-build instead of
      # rebuilding. Saves 60-120s on every e2e run (the prior single-build
      # consolidation in PR-A still rebuilt; this eliminates the rebuild
      # entirely). The artifact carries the seed-aware NEXT_PUBLIC_* vars
      # baked into client bundles at build time.
      - name: Download .next + public artifact from frontend-build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: nextjs-build
          # download-artifact restores at the cwd by default; .next and
          # public extract to project root, matching `npm run start`'s
          # expected layout.
      - name: Start server and run Playwright
        # Skip the unconditional placeholder-env smoke specs during a golden-bake
        # dispatch. They are irrelevant to baking, and this step is flaky
        # (placeholder.supabase.co public-route specs). Its failure would SKIP the
        # seeded bake step below: that step's `if: vars.E2E_TEST_DB_CONFIGURED`
        # carries no status function, so GitHub implicitly ANDs it with success(),
        # and a FAILED prior step makes success() false → the bake never runs and
        # the artifact upload then fails on if-no-files-found. A SKIPPED step (not
        # a failed one) keeps success() true, so seed/rebuild/bake still run.
        # Normal push/PR (and non-bake dispatches) are unaffected — the step runs.
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.bake_svg_goldens) }}
        # continue-on-error KEPT after the 2026-07-02 e2e split (reviewer
        # CR-3): its original success()-gating rationale (protecting the
        # downstream seeded step) is gone — the seeded batch is its own
        # parallel job now — but the placeholder-env flake itself
        # (getaddrinfo ENOTFOUND placeholder.supabase.co) was never fixed,
        # only masked, and a red job on a MAIN merge commit makes Railway
        # silently skip the analytics deploy (deploy-on-green-CI, no
        # auto-recover on rerun-green). Signal is preserved by the red-step
        # annotation + the failure-report upload below. Flip this off only
        # after fixing the placeholder flake at the root.
        id: smoke
        continue-on-error: true
        run: |
          npm run start &
          SERVER_PID=$!
          # Wait for server to respond (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Phase 48-04 / A11Y-01 / FLOW-01 (place 1, UNSEEDED): the new
          # e2e/axe-app-wide.spec.ts runs its PUBLIC route × viewport rows here
          # (those describe blocks carry NO seed gate); its authed + embedded
          # describes self-skip without seed env (place 2 = the spec's
          # HAS_SEED_ENV const) and run in the seeded MA-8 list below. Adding a
          # spec? Update BOTH lists or the gate silently never runs (burned >=3x).
          # Capture the test exit code WITHOUT aborting the script (default
          # shell is `bash -e`). The port-3000 cleanup below is a FINALLY so a
          # failing spec never leaves an orphaned next-server bound to :3000
          # (runner hygiene for the upload steps that follow; the seeded batch
          # now runs on its own runner in the parallel e2e-seeded job, so this
          # is no longer protecting a downstream WR-04 guard in THIS job).
          set +e
          if [ "${BAKE_DEMO_SCREENSHOTS}" = "true" ]; then
            # One-shot baseline bake (workflow_dispatch input bake_demo_screenshots).
            # Run ONLY demo-screenshot with --update-snapshots so no other spec's
            # baselines are touched; the regenerated PNGs (taken in THIS
            # placeholder env — the same env they're diffed against — so no
            # jammy-vs-ubuntu divergence) upload as an artifact for per-shot human
            # review. NEVER auto-committed here (the locked "no blind
            # --update-snapshots" rule) — a follow-up PR lands the reviewed PNGs.
            npx playwright test e2e/demo-screenshot.spec.ts \
              --update-snapshots \
              --timeout 60000
          else
            npx playwright test e2e/auth.spec.ts e2e/smoke.spec.ts e2e/demo-public.spec.ts e2e/demo-founder-view.spec.ts e2e/onboarding-banner-smoke.spec.ts e2e/demo-screenshot.spec.ts e2e/reflow.spec.ts e2e/target-size.spec.ts e2e/reflow-sweep.spec.ts e2e/no-clip-sweep.spec.ts e2e/axe-app-wide.spec.ts e2e/marketing-shell.spec.ts e2e/route-redirects.spec.ts
          fi
          PW_EXIT=$?
          set -e
          # v0.17.1.18: belt + suspenders + nuclear port-3000 cleanup.
          # The v0.17.1.15 attempt (lsof + 5s poll) was insufficient — CI
          # confirmed (PR #98 run #320) that the next-server grandchild
          # was still binding port 3000 when the seed-gated step's WR-04
          # guard ran. Layer multiple methods so any one of them catches
          # the listener regardless of process model.
          echo "[port-cleanup] before: $(lsof -ti:3000 2>/dev/null | tr '\n' ' ')"
          kill -TERM $SERVER_PID 2>/dev/null || true
          # Kill the children of the npm parent (catches the next start
          # intermediary that npm spawns).
          pkill -TERM -P $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          # Kill anything matching next-server (catches the grandchild
          # whose parent is now init, not visible from $SERVER_PID tree).
          # Scope to current user — `pkill -f` is otherwise host-wide and
          # would target sibling jobs on shared/self-hosted runners. The
          # `id -u` resolves at runtime in the runner shell; no external
          # input flows in here.
          _RUNNER_UID=$(id -u)
          pkill -KILL -u "$_RUNNER_UID" -f "next-server" 2>/dev/null || true
          pkill -KILL -u "$_RUNNER_UID" -f "next start" 2>/dev/null || true
          # Final fallback: kill anything bound to port 3000.
          lsof -ti:3000 2>/dev/null | xargs -r kill -9 2>/dev/null || true
          # Kernel-level port nuke (works even when no PID is visible).
          fuser -k 3000/tcp 2>/dev/null || true
          # Poll up to 10s for both ss and lsof to agree port is free.
          # The WR-04 guard checks BOTH so the cleanup must satisfy both.
          for i in $(seq 1 10); do
            ss_bound=$(ss -ltn 2>/dev/null | grep -q ':3000\b' && echo y || echo n)
            lsof_bound=$(lsof -nP -iTCP:3000 -sTCP:LISTEN 2>/dev/null | grep -q LISTEN && echo y || echo n)
            if [ "$ss_bound" = n ] && [ "$lsof_bound" = n ]; then
              echo "[port-cleanup] released after ${i}s"
              break
            fi
            # Re-nuke each iteration in case a respawn loop is active.
            lsof -ti:3000 2>/dev/null | xargs -r kill -9 2>/dev/null || true
            sleep 1
          done
          echo "[port-cleanup] after: $(lsof -ti:3000 2>/dev/null | tr '\n' ' '),ss:$(ss -ltn 2>/dev/null | grep ':3000\b' || echo none)"
          # Re-surface the test result as the step's exit code now that the
          # port is freed. continue-on-error tolerates it (conclusion=success,
          # outcome=failure) so the job stays green on the known placeholder
          # flake (Railway deploy-on-green-CI); the red step annotation + the
          # outcome-gated report upload below keep the failure visible.
          exit $PW_EXIT
        env:
          # workflow_dispatch one-shot baseline-bake toggle (drives the if/else
          # in the run block above). Renders "true" only on a manual dispatch
          # with bake_demo_screenshots checked; "false" on every push/PR run.
          BAKE_DEMO_SCREENSHOTS: ${{ github.event_name == 'workflow_dispatch' && inputs.bake_demo_screenshots }}
          # C-0293(c): runtime env mirrors the placeholder build above.
          # The unconditional spec set (auth, smoke, demo-public,
          # demo-founder-view, onboarding-banner-smoke) does NOT
          # authenticate against a real Supabase — placeholder is
          # correct here. The seed-gated step below uses real env
          # against a separately-rebuilt `.next/` (never uploaded).
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role
          ADMIN_EMAIL: test@example.com
          PLATFORM_NAME: Quantalyze
          PLATFORM_EMAIL: test@quantalyze.com
      # Baseline bake (workflow_dispatch input bake_demo_screenshots): upload
      # ONLY the demo-screenshot snapshot PNGs — page images, no .next bundle /
      # trace.zip / page HTML — so the C-0293(c) secret-in-artifact concern that
      # gates the playwright-report upload below does NOT apply here. These PNGs
      # are the per-shot review material; a human eyeballs each, then a follow-up
      # PR commits them. if-no-files-found: error fails loud if nothing was baked.
      - name: Upload baked demo screenshots for review (workflow_dispatch bake only)
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.bake_demo_screenshots }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: demo-screenshots-baked
          path: e2e/demo-screenshot.spec.ts-snapshots/**/*.png
          if-no-files-found: error
          retention-days: 7
      # This job never carries real test-Supabase env (the seeded batch is
      # its own job below), so a failure report here can only embed
      # placeholder values — the C-0293(c) artifact-leak concern does not
      # apply. Gate on the smoke step's OUTCOME (pre-continue-on-error
      # result): with continue-on-error the job-level failure() never
      # becomes true, so a plain `if: failure()` would never fire.
      - name: Upload Playwright report on failure
        if: ${{ steps.smoke.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  e2e-seeded:
    # Plan 11-07 / BLOCK-3 + CI speed (2026-07-02): the seed-gated Playwright
    # batch in its OWN job, so it runs in PARALLEL with the placeholder smoke
    # batch above instead of sequentially after it (~13m job → two ~8-9m
    # jobs). Gate uses the repo VARIABLE `E2E_TEST_DB_CONFIGURED` (NOT
    # `secrets.X != ''`) — vars are exposed in PR contexts so a typo in the
    # variable name surfaces in the workflow log; a `secrets.X != ''` gate
    # would mask typos behind redaction and silently disable the spec. When
    # the variable is unset (fork PRs, repos without test-DB setup) the whole
    # job skips silently.
    #
    # C-0293(c): this job BUILDS Next.js itself with the real test env
    # (NEXT_PUBLIC_* inline at build time) instead of downloading the
    # placeholder nextjs-build artifact and rebuilding over it — the rebuilt
    # `.next/` stays on this ephemeral runner and is NEVER uploaded. That
    # also means needs: only typecheck (F2 rationale: don't burn minutes on
    # an already-doomed PR; e2e validity depends on types, not unit tests).
    runs-on: ubuntu-latest
    # Fork-PR composition (same as sql-tests): repo VARIABLES are readable in
    # fork-PR runs while secrets are withheld, so the vars gate alone would
    # start the job on a fork and die at the seed step with empty secrets.
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && vars.E2E_TEST_DB_CONFIGURED == 'true' }}
    needs:
      - frontend-typecheck
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # retro-PR179-M-persist-chain: drop the default persisted
          # GITHUB_TOKEN cred from .git/config (same rationale as the e2e
          # smoke job above).
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Restore node_modules
        id: node_modules_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: npm ci (cache miss; retry transient network failures)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci --prefer-offline --no-audit --no-fund; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      # Same Playwright browser cache as the smoke job (keyed on the
      # Playwright package version). Restore-only here — the smoke job owns
      # the write so the two parallel jobs never race the save.
      - name: Restore Playwright browsers
        id: playwright-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('node_modules/@playwright/test/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright (browser bundle from cache when available)
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — chromium bundle restored. Runner image has system libs; skipping apt install."
          else
            npx playwright install --with-deps chromium
          fi
      - name: Seed demo data into test Supabase
        # Populates the 8-strategy demo set the seed-gated specs require.
        # Defense-in-depth against running this against prod by accident:
        # the SEED_CONFIRM_STAGING interlock + the script's prod-URL probe
        # both fail loudly if a secret is misrouted.
        run: SEED_CONFIRM_STAGING=true npx tsx scripts/seed-demo-data.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      # retro-PR179-M-cache: restore .next/cache (Next.js incremental
      # webpack/Turbopack store) for the seed-gated rebuild. The
      # downloaded nextjs-build artifact excludes .next/cache/** (see
      # frontend-build upload step), and the e2e job previously had no
      # actions/cache restore — so the rebuild's "incremental on top
      # of the placeholder run" promise (in the comment below) was
      # factually false. The rebuild was running cold (~47-50s observed
      # across 4 post-merge runs vs the 30-60s stated range, at the
      # upper bound).
      #
      # Restore from the SAME cache key as frontend-build:Cache .next/cache
      # (read-only restore from the e2e side; frontend-build is the
      # writer). Cache buckets keyed on hashFiles(...) are content-
      # addressed, so the prefix-only restore-keys fallback handles the
      # case where frontend-build's cache step hashed src/** to a
      # different bucket than this e2e job sees.
      - name: Restore .next/cache for the test-env build (read-only)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'next.config.*', 'tsconfig.json', 'tailwind.config.*', 'postcss.config.*') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json', 'next.config.*', 'tsconfig.json', 'tailwind.config.*', 'postcss.config.*') }}-
      - name: Build Next.js with real test-Supabase env (C-0293(c))
        # The seed-gated specs (onboarding-funnel, discovery, strategy-v2,
        # composer-axe, …) need the real URL/anon key INLINED into the
        # browser bundle (Next.js evaluates NEXT_PUBLIC_* at build time,
        # not runtime). This job builds from a clean workspace — no
        # placeholder artifact to wipe/merge against (that dance lived in
        # the old single e2e job) — and the built `.next/` stays on the
        # runner FS: it is NEVER uploaded as an artifact, so the test-DB
        # credentials never leave the ephemeral runner. On a warm
        # .next/cache (frontend-build writes the same key) the build is
        # genuinely incremental.
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_EMAIL: test@example.com
          PLATFORM_NAME: Quantalyze
          PLATFORM_EMAIL: test@quantalyze.com
      # retro-PR188-D4 (pr-test-analyzer #36, HIGH/8): assert the rebuild
      # actually produced a bundle inlined with the REAL test-Supabase
      # URL. If the build ever short-circuits silently (e.g. a restored
      # .next/cache satisfying a stale manifest, or an env plumbing drift),
      # the seed-gated specs would self-skip via HAS_SEED_ENV checks and CI
      # would still report green — but the seed-gated spec coverage would
      # be a no-op. The grep is read-only,
      # touches only the local FS (the rebuilt `.next/` is never
      # uploaded), and uses the secret only via the variable expansion
      # GitHub Actions already redacts in logs. The exit code IS the
      # signal: zero hits = build did not inline = fail.
      - name: Verify build inlined real test-Supabase URL
        env:
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
        run: |
          if [ -z "$TEST_SUPABASE_URL" ]; then
            echo "::error::TEST_SUPABASE_URL empty — seed-gated step ran without secret"
            exit 1
          fi
          # Strip the scheme so a partial match (host only) still works.
          host="${TEST_SUPABASE_URL#https://}"
          host="${host#http://}"
          if ! grep -r -l --include='*.js' --include='*.json' "$host" .next/static .next/server > /dev/null 2>&1; then
            echo "::error::Rebuild did not inline TEST_SUPABASE_URL into .next/static or .next/server — seed-gated specs would run against placeholder bundle"
            exit 1
          fi
          echo "Rebuild inlined real test-Supabase URL into .next/ — proceeding to seed-gated specs."
      - name: Guard -- sfox-badge anti-mask assertions present (FACTSHEET-02)
        # Phase 126 / FACTSHEET-02 anti-tamper: e2e-seeded is now BLOCKING
        # (frontend aggregator), so a green sfox-badge run is load-bearing.
        # DELETING the non-owner badge-visibility legs (admin + anon) or the
        # owner-leg axe zero-violations assertion would GUT the FACTSHEET-01
        # anti-mask net while still passing the spec -- false-greening the
        # gate. This grep fails the job if any of those load-bearing
        # assertions are gone, so the gate cannot be satisfied by weakening
        # the spec. Read-only; anchors are literal (`-F`), no untrusted input.
        run: |
          spec=e2e/sfox-badge.spec.ts
          fail=0
          need_anchor() {
            if ! grep -qF "$1" "$spec"; then
              echo "::error::sfox-badge anti-mask guard: missing assertion anchor -- $2"
              fail=1
            fi
          }
          need_anchor 'anon: a logged-out visitor sees the api_verified badge' 'anon non-owner badge-visible leg'
          need_anchor "admin: an elevated session reads the sfox strategy" 'admin non-owner badge-visible leg'
          need_anchor 'results.violations).toEqual([])' 'owner-leg axe zero-violations assertion'
          # RT-01: pin the apiVerifiedBadge() helper SELECTOR too. The badge
          # assertions above call the helper; redefining it to a vacuous locator
          # (e.g. page.locator("body")) would keep every assertion textually
          # present while making them pass trivially. Anchoring the real badge
          # selector defeats that.
          need_anchor 'data-trust-tier="api_verified"' 'apiVerifiedBadge helper selector (prevents redefining the helper to a vacuous locator)'
          # Title anchors alone are gameable: the test TITLES could survive while
          # the actual badge-visibility ASSERTIONS are gutted or downgraded (e.g.
          # swapping toBeVisible for a weaker matcher, or emptying a leg body) --
          # the grep would still pass and green-wash a weakened spec. So also
          # anchor on the badge-visibility ASSERTION EXPRESSION itself and require
          # its minimum count. Deleting or weakening ANY of the four badge-visible
          # legs (owner-factsheet + allocator + admin-non-owner + anon-non-owner)
          # drops the count below the floor and fails the gate.
          badge_assert='expect(apiVerifiedBadge(page).first()).toBeVisible'
          min_badge=4
          badge_count=$(grep -cF "$badge_assert" "$spec" || true)
          if [ "$badge_count" -lt "$min_badge" ]; then
            echo "::error::sfox-badge anti-mask guard: badge-visibility assertions dropped to ${badge_count} (need >= ${min_badge}) -- a non-owner api_verified badge assertion was deleted or weakened."
            fail=1
          fi
          # RT-01 skip-token guard: the anchors above pin assertion TEXT, but a
          # `test.skip(true …)` / `test.skip()` / `.fixme` / `test.only` /
          # `describe.only|skip` would leave that text present while Playwright
          # SKIPS the leg -> a green run that never asserted the badge. The ONLY
          # legitimate skip here is the conditional `test.skip(!HAS_SEED_ENV, …)`
          # (guards the seeded suite when the test DB isn't wired). Any
          # unconditional skip/fixme/only is a tamper.
          if grep -Eq 'test\.skip\(\s*true|test\.skip\(\s*\)|\.fixme\(|test\.only\(|describe\.only\(|describe\.skip\(' "$spec"; then
            echo "::error::sfox-badge anti-mask guard: an unconditional skip/fixme/only (test.skip(true|), .fixme, test.only, describe.only/skip) is present in ${spec} -- a badge leg may not execute. Only test.skip(!HAS_SEED_ENV, …) is permitted."
            fail=1
          fi
          if [ "$fail" = "1" ]; then
            echo "::error::e2e/sfox-badge.spec.ts anti-mask assertions were weakened -- refusing to green the FACTSHEET-02 gate."
            exit 1
          fi
          echo "sfox-badge anti-mask assertions present (anon + admin badge-visible titles + ${badge_count} badge-visibility assertions + axe zero-violations)."
      - name: Run seed-gated specs (MA-8 / BLOCK-3)
        run: |
          # Phase 11 review fix WR-04: defense-in-depth port-bind guard.
          # The previous unconditional smoke step kills+waits its own server,
          # but if a stale process from earlier in the runner had not yet
          # released port 3000, `npm run start &` would silently fail to
          # bind and the readiness loop below would time out. Surface that
          # explicitly so the step fails fast rather than appearing green
          # while the spec spins on a stale build.
          if ss -ltn 2>/dev/null | grep -q ':3000\b' \
            || lsof -nP -iTCP:3000 -sTCP:LISTEN 2>/dev/null | grep -q LISTEN; then
            echo "Port 3000 still bound after the previous step — failing fast." >&2
            exit 1
          fi
          npm run start &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          # MA-8: every seed-gated spec runs together so wiring the
          # E2E_TEST_DB_CONFIGURED variable surfaces all of them at once.
          # Each spec self-skips when HAS_SEED_ENV is false; with the
          # variable set the gate above resolves to true → seeded run.
          # Adding/removing a seed-gated spec? Update both this list and
          # the e2e/<spec>.spec.ts HAS_SEED_ENV constant.
          if [ "${BAKE_SVG_GOLDENS}" = "true" ]; then
            # One-shot golden bake (workflow_dispatch input bake_svg_goldens).
            # Run ONLY the svg-parity spec with --update-snapshots so no other
            # spec's baselines are touched; the PNGs upload as an artifact for
            # per-chart human review. NEVER auto-committed here (the locked
            # "no blind --update-snapshots" rule) — a follow-up PR lands the
            # reviewed PNGs and the spec's WR-02 guard flips the gate live.
            npx playwright test e2e/svg-chart-parity.spec.ts \
              --update-snapshots \
              --timeout 60000
          else
            npx playwright test \
              e2e/onboarding-funnel.spec.ts \
              e2e/discovery-axe.spec.ts \
              e2e/discovery-hide-examples-default.spec.ts \
              e2e/discovery-prefs-isolation.spec.ts \
              e2e/strategy-v2-partial-data.spec.ts \
              e2e/strategy-v2-chart-parity.spec.ts \
              e2e/strategy-v2-keyboard.spec.ts \
              e2e/strategy-v2-axe.spec.ts \
              e2e/composer-axe.spec.ts \
              e2e/wizard-axe.spec.ts \
              e2e/composite-onboarding.spec.ts \
              e2e/composite-factsheet-render.spec.ts \
              e2e/sfox-badge.spec.ts \
              e2e/mt5-badge.spec.ts \
              e2e/admin-compute-jobs-axe.spec.ts \
              e2e/mobile-drawer-keyboard.spec.ts \
              e2e/reflow-sweep-authed.spec.ts \
              e2e/svg-chart-parity.spec.ts \
              e2e/target-size.spec.ts \
              e2e/no-clip-sweep.spec.ts \
              e2e/axe-app-wide.spec.ts \
              --timeout 60000
          fi
          # Phase 47-05 / FLOW-01 (place 1 of 2): the fresh
          # e2e/svg-chart-parity.spec.ts (desktop goldens + 320px portrait)
          # is added here so it runs SEEDED. The dead
          # e2e/strategy-v2-chart-parity.spec.ts above is intentionally LEFT
          # in place (it self-skips via test.skip(true); Phase-48 concern) —
          # do NOT remove it. e2e/target-size.spec.ts is ALSO listed here (in
          # addition to its unseeded entry at the line ~1059 list) so its new
          # SEEDED chart-tap-rect cases (which self-skip in the unseeded run)
          # actually execute; its unseeded /security case keeps running in the
          # unseeded list. Both new gates are HAS_SEED_ENV-guarded (place 2).
          # Phase 54-08 / VERIFY-02 / FLOW-01 (place 1 of 2): e2e/axe-app-wide.spec.ts
          # is NOW in this seeded MA-8 list (above) so its authed + embedded +
          # mobile + 2560 ultra-wide describes run hermetically against the seeded
          # DB. It ALSO stays in the unseeded list (~line 1059) for its public
          # route × viewport rows; the spec's HAS_SEED_ENV const + the two
          # test.skip(!HAS_SEED_ENV, …) gates (place 2) self-skip the authed/
          # embedded describes when the seed env is absent, so unseeded/local
          # runs stay green-by-skip.
          # WHY this is safe now (it was PUBLIC-only in v1.3 / Phase 48-04): the
          # MA-8 invocation shares ONE test database across all specs, and the
          # v1.3 attempt to run axe-app-wide here regressed three behaviours —
          # (a) seedBridgeCandidate({crypto-sma}) published a non-example strategy
          # into the crypto-sma category that discovery-hide-examples-default.spec.ts
          # asserts is EMPTY on first paint; (b) its public rows re-ran against the
          # rebuilt test-Supabase and 500'd /demo; (c) the polluted DB produced
          # spurious wizard axe findings the focused wizard-axe.spec.ts does NOT
          # see. VERIFY-02 closes all three: the ONE cross-spec-dangerous seed —
          # the crypto-sma discovery row — is now torn down by id in a `finally`
          # (delete-by-id + bridge-owner cascade via the prod-safe cleanup helper),
          # so discovery-hide-examples-default sees the category empty again and
          # the /demo + wizard regressions (downstream of that pollution) no longer
          # occur. The per-unique-user allocator/strategy/wizard seeds are inert to
          # other specs (timestamped emails). The focused MA-8 axe specs
          # (discovery-axe / strategy-v2-axe / composer-axe / wizard-axe) still run
          # alongside as the per-route floor.
          # Same kill+wait+nuke pattern as the unconditional step above so any
          # follow-up runner work (artifact upload) doesn't race on resources.
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          lsof -ti:3000 2>/dev/null | xargs -r kill -9 2>/dev/null || true
        env:
          # workflow_dispatch one-shot golden-bake toggle (drives the if/else
          # in the run block above). Renders "true" only on a manual dispatch
          # with bake_svg_goldens checked; "false" on every push/PR run.
          BAKE_SVG_GOLDENS: ${{ github.event_name == 'workflow_dispatch' && inputs.bake_svg_goldens }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_EMAIL: test@example.com
          PLATFORM_NAME: Quantalyze
          PLATFORM_EMAIL: test@quantalyze.com
          # Seed-gated server runs in production mode (`npm run start`), so the
          # localhost:3000 auto-allowlist in src/lib/csrf.ts:67 (NODE_ENV !==
          # "production" branch) never fires. The discovery-prefs-isolation
          # spec PUTs /api/preferences via page.request.put with an explicit
          # Origin header; without an entry here, the CSRF guard 403s with
          # "Origin not allowed". Adding the localhost origin to the runtime
          # allowlist scopes the exception to this seed-gated step only.
          # No production exposure: prod sets NEXT_PUBLIC_SITE_URL to the
          # canonical Vercel host.
          NEXT_PUBLIC_ALLOWED_ORIGINS: http://localhost:3000
      # Golden bake (workflow_dispatch input bake_svg_goldens): upload ONLY the
      # svg-chart-parity snapshot PNGs — chart images, no .next bundle /
      # trace.zip / page HTML — so the C-0293(c) secret-in-artifact concern
      # that gates the playwright-report upload below does NOT apply here. These
      # PNGs are the per-chart review material; a human eyeballs each, then a
      # follow-up PR commits them (the locked "never blind --update-snapshots"
      # rule). if-no-files-found: error fails loud if the bake produced nothing.
      - name: Upload baked SVG goldens for review (workflow_dispatch bake only)
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.bake_svg_goldens }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: svg-chart-goldens-baked
          path: e2e/svg-chart-parity.spec.ts-snapshots/**/*.png
          if-no-files-found: error
          retention-days: 7
      # retro-PR179-H1 / C-0293(c): NO playwright-report upload from this
      # job, ever. Every spec here runs against the REAL-env build, and
      # Playwright's trace.zip + on-failure screenshots embed
      # NEXT_PUBLIC_SUPABASE_URL / NEXT_PUBLIC_SUPABASE_ANON_KEY from the
      # bundle's .next/static/chunks/*.js — an uploaded artifact would sit
      # in actions storage for 7 days with actions:read scope, re-opening
      # the exfil pivot the C-0293(c) artifact-leak fix closed for
      # nextjs-build. (The old single e2e job expressed this as a
      # vars-allow-listed gate — retro-PR188-F6 — because it mixed
      # placeholder and real-env specs; this job is real-env only, so the
      # honest encoding is simply no upload step.) Recovery on failure:
      # re-run locally with PWDEBUG=1 + the test-DB env in the developer's
      # shell; the smoke job's placeholder-env report still uploads.

  lighthouse-mobile:
    # Phase 48-05 / A11Y-03: mobile Lighthouse performance budget over the
    # 5 PUBLIC routes (lighthouserc.json).
    #
    # ADVISORY since 2026-07-02 (CI speed, user decision): no longer in the
    # `frontend` aggregator's needs/result-check — it was the merge gate's
    # slowest dependency (~+2m) and its noisiest signal. A red check here is
    # still visible on every PR; treat a real perf regression seriously, it
    # just doesn't block the merge.
    #
    # Mirrors the e2e job's
    # build-artifact-restore + start-server shape: download the production
    # nextjs-build artifact (.next + public), `npm run start` against the
    # PRODUCTION build, then `npx lhci autorun` (Pitfall 6 — never next dev).
    #
    # SECURITY (T-48-05-INFO): this job receives NO TEST_SUPABASE_* secret.
    # lighthouserc.json collects PUBLIC routes ONLY (headless can't auth) and
    # uploads to temporary-public-storage, so nothing sensitive could leak to
    # that public target. Build/runtime env is PLACEHOLDER only, exactly like
    # the unconditional e2e spec set — public routes render on placeholders.
    # Authed-route perf is covered by the human real-device sign-off
    # (48-HUMAN-UAT.md / SC#5), not by lhci.
    runs-on: ubuntu-latest
    # Depend on the artifact producer (frontend-build) + typecheck so we don't
    # burn a runner when the build/types are already known-broken. Same `needs`
    # rationale as the e2e job above (don't gate on the slow unit-test shard).
    needs:
      - frontend-build
      - frontend-typecheck
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      # Restore the shared node_modules cache (populated by deps-cache) — same
      # restore-only pattern as the other frontend-* jobs. @lhci/cli is a pinned
      # devDependency (0.15.1), so a cache hit already carries it.
      - name: Restore node_modules
        id: node_modules_cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: npm ci (cache miss; retry transient network failures)
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: |
          n=0
          until npm ci --prefer-offline --no-audit --no-fund; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "npm ci failed after $n attempts"; exit 1; fi
            echo "npm ci attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done
      # lhci drives a real headless Chrome (chrome-launcher). Reuse the trusted
      # `playwright install chromium` path (already used by the e2e job) rather
      # than adding a third-party Chrome-setup action (supply-chain surface).
      # chrome-launcher honours $CHROME_PATH at top priority (verified:
      # node_modules/chrome-launcher/dist/chrome-finder.js:71-80), so we point
      # it at the installed Chromium binary explicitly.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('node_modules/@playwright/test/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright Chromium (for lhci's headless Chrome)
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit — chromium bundle restored. Runner image has system libs; skipping apt install."
          else
            npx playwright install --with-deps chromium
          fi
      # Download the SAME production .next + public artifact the e2e job uses.
      # It was built with PLACEHOLDER NEXT_PUBLIC_* (frontend-build) — public
      # routes render fine on placeholders, and lhci needs no real secret.
      - name: Download .next + public artifact from frontend-build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: nextjs-build
      - name: Run Lighthouse mobile budget (lhci autorun against npm run start)
        run: |
          # Resolve the Playwright-installed Chromium so chrome-launcher uses it
          # (top-priority via $CHROME_PATH). The glob covers the linux headless
          # shell layout playwright install lays down.
          CHROME_BIN="$(find "$HOME/.cache/ms-playwright" -name 'chrome' -path '*chrome-linux*' -type f 2>/dev/null | head -1)"
          if [ -z "$CHROME_BIN" ]; then
            CHROME_BIN="$(find "$HOME/.cache/ms-playwright" -name 'headless_shell' -type f 2>/dev/null | head -1)"
          fi
          if [ -z "$CHROME_BIN" ]; then
            echo "::error::Could not locate a Playwright-installed Chromium for lhci"; exit 1
          fi
          echo "Using CHROME_PATH=$CHROME_BIN"
          export CHROME_PATH="$CHROME_BIN"
          # lighthouserc.json owns startServerCommand (`npm run start`) + the
          # ready-pattern wait + the 5 public URLs + the mobile form-factor +
          # the error-level minScore. lhci starts/stops the server itself.
          npx lhci autorun --config=lighthouserc.json
        env:
          # PLACEHOLDER env ONLY — public routes render on placeholders and lhci
          # needs no real secret. Deliberately NO TEST_SUPABASE_* here
          # (T-48-05-INFO): the lhci report uploads to temporary-public-storage.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role
          ADMIN_EMAIL: test@example.com
          PLATFORM_NAME: Quantalyze
          PLATFORM_EMAIL: test@quantalyze.com
      # VERIFY-03 re-measure mechanism: upload UNCONDITIONALLY (if: always()),
      # not just on failure. The `.lighthouseci/` manifest.json + *.report.json
      # carry the per-URL 3-run-median `categories.performance.score`; the lhci
      # minScore ratchet is data-driven (= lowest measured median − 0.02), so the
      # measured floor must be READABLE from a GREEN run — not only when the
      # assertion fails. PUBLIC-only URLs + placeholder env keep this safe to
      # upload to temporary-public-storage (T-54-04-01 / T-48-05-INFO).
      - name: Upload Lighthouse reports (always — readable measured floor)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: lighthouse-mobile-report
          path: .lighthouseci/
          retention-days: 7
          if-no-files-found: ignore
