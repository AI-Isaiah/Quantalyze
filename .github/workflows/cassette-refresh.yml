name: Cassette refresh (OKX + Bybit)

# Daily re-record of broker cassettes so the replay suite catches schema
# rotations BEFORE the live route does. Runs `scripts/repro-key-flow.sh
# --record` against real broker APIs using read-only credentials in GH
# secrets, runs the two-layer leak gate (Layer A: known-env match; Layer B:
# high-entropy literal in signing-key-named fields), and auto-PRs the diff
# back to main if cassettes diverged.
#
# Binance is OUT OF SCOPE — no production test keys provisioned. OKX + Bybit
# only.
#
# Injection-safety: all `${{ }}` expressions in run-steps are routed through
# env: blocks to avoid the GitHub Actions command-injection class. The PR
# action receives metadata as parameters (not shell), so direct interpolation
# is safe there.
#
# Operator notes:
#   - DEBUG_KEY_FLOW_* secrets must be set on the repo (Settings →
#     Secrets and variables → Actions). 2026-05-27: OKX_KEY/SECRET/
#     PASSPHRASE + BYBIT_KEY/SECRET all present.
#   - The recorder is idempotent on happy/auth-fail (skips if present) but
#     ALWAYS re-synthesizes rate-limit + schema-drift from happy. To force
#     a full refresh, use the workflow_dispatch `force_refresh` input.
#   - The auto-PR uses peter-evans/create-pull-request with the default
#     GITHUB_TOKEN (contents: write + pull-requests: write at the job).

on:
  schedule:
    # 04:00 UTC daily — well before the 00:30 UTC Phase 19 rollup cron and
    # outside US/EU broker maintenance windows (~16:00 UTC). Catches schema
    # drift before the next rollup tick.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Delete existing happy.yaml + auth-fail.yaml before recording (forces full refresh)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: cassette-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # tech-debt #8: needed by the if:failure() issue-filing step so a broken
      # cassette-refresh pages someone instead of rotting silently in the
      # Actions tab (this workflow had no failure alerting; nightly.yml does).
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          # 3.12 matches ci.yml's pinned version. 3.14 fails wheel-builds for
          # pyarrow + pydantic-core (PyO3 v0.24 caps at 3.13). Keep both
          # workflows aligned to avoid the same divergence biting the next
          # CI flake.
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            analytics-service/requirements.txt
            analytics-service/requirements-dev.txt

      - name: Install analytics-service deps (retry transient index failures)
        working-directory: analytics-service
        run: |
          # analytics-service uses requirements.txt + requirements-dev.txt
          # (no pyproject.toml). Mirrors ci.yml's retry pattern for
          # transient pip-index/CDN flakiness.
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          n=0
          until .venv/bin/pip install -r requirements.txt -r requirements-dev.txt; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "pip install failed after $n attempts"; exit 1; fi
            echo "pip install attempt $n failed (transient?); retrying in $((n*5))s"
            sleep $((n*5))
          done

      - name: Force refresh (workflow_dispatch only)
        env:
          FORCE_REFRESH: ${{ inputs.force_refresh }}
        if: ${{ inputs.force_refresh == true }}
        run: |
          echo "force_refresh=$FORCE_REFRESH — deleting existing happy.yaml + auth-fail.yaml"
          rm -f analytics-service/tests/cassettes/okx/happy.yaml
          rm -f analytics-service/tests/cassettes/okx/auth-fail.yaml
          rm -f analytics-service/tests/cassettes/bybit/happy.yaml
          rm -f analytics-service/tests/cassettes/bybit/auth-fail.yaml

      - name: Record cassettes + leak gate
        id: record
        env:
          DEBUG_KEY_FLOW_OKX_KEY: ${{ secrets.DEBUG_KEY_FLOW_OKX_KEY }}
          DEBUG_KEY_FLOW_OKX_SECRET: ${{ secrets.DEBUG_KEY_FLOW_OKX_SECRET }}
          DEBUG_KEY_FLOW_OKX_PASSPHRASE: ${{ secrets.DEBUG_KEY_FLOW_OKX_PASSPHRASE }}
          DEBUG_KEY_FLOW_BYBIT_KEY: ${{ secrets.DEBUG_KEY_FLOW_BYBIT_KEY }}
          DEBUG_KEY_FLOW_BYBIT_SECRET: ${{ secrets.DEBUG_KEY_FLOW_BYBIT_SECRET }}
        # --allow-partial: a geo-blocked/unreachable broker (e.g. Bybit blocks
        # GitHub's US runner IPs at CloudFront) is restored from git and skipped
        # so the reachable broker still refreshes + PRs. The job is still failed
        # loud at the end via the "Enforce broker reachability" step, AFTER any
        # PR for the reachable broker has been opened.
        run: bash scripts/repro-key-flow.sh --record --allow-partial

      - name: Detect cassette diff
        id: diff
        run: |
          if git diff --quiet -- analytics-service/tests/cassettes/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No cassette diff vs main — broker schemas stable."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Cassette diff detected:"
            git diff --stat -- analytics-service/tests/cassettes/
          fi

      - name: Create auto-PR on cassette diff
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          branch: chore/cassette-refresh-${{ github.run_number }}
          delete-branch: true
          # Bound the commit's blast radius to cassettes only — never sweep an
          # unrelated dirty workspace path (or a stray file) into the auto-PR.
          add-paths: analytics-service/tests/cassettes/**
          commit-message: |
            chore(cassettes): daily refresh — broker schema drift detected

            Run #${{ github.run_number }} of cassette-refresh.yml caught a
            divergence between recorded broker responses and what's on
            main. Leak gate (Layer A + B) passed on the new cassettes.

            Review the diff carefully — a schema field rename or drop
            may break the unified key-flow replay tests.
          title: "chore(cassettes): daily refresh — broker schema drift detected (run #${{ github.run_number }})"
          body: |
            ## Cassette drift detected

            The daily `cassette-refresh.yml` workflow recorded fresh broker
            responses for OKX + Bybit and found they differ from what's on
            `main`. The two-layer leak gate (env-value match + high-entropy
            literal scan) passed on the new cassettes — safe to commit.

            ### What to verify before merging

            1. Look at the diff for each broker (`okx/`, `bybit/`).
            2. If a ccxt-canonical field was renamed/dropped, update
               `analytics-service/scripts/record_cassettes.py`'s
               `_synthesize_schema_drift` mapping AND the replay test.
            3. If only `headers.date` / opaque tokens changed, the drift is
               cosmetic — safe to merge.

            ### Workflow context

            - Triggered by: `${{ github.event_name }}`
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            🤖 Generated by `.github/workflows/cassette-refresh.yml`
          labels: |
            cassettes
            automated
          assignees: AI-Isaiah

      - name: Summary
        if: always()
        env:
          DIFF_CHANGED: ${{ steps.diff.outputs.changed }}
          FAILED_BROKERS: ${{ steps.record.outputs.failed_brokers }}
          SKIPPED_BROKERS: ${{ steps.record.outputs.skipped_brokers }}
        run: |
          {
            echo "## Cassette refresh summary"
            echo ""
            if [ "$DIFF_CHANGED" = "true" ]; then
              echo "**Status:** Diff detected — auto-PR opened."
            elif [ "$DIFF_CHANGED" = "false" ]; then
              echo "**Status:** No diff — broker schemas stable."
            else
              echo "**Status:** Recording or leak gate failed before diff check."
            fi
            if [ -n "$FAILED_BROKERS" ]; then
              echo ""
              echo "**Unreachable broker(s):** \`$FAILED_BROKERS\` — restored from git unchanged (geo-block/outage). Re-record from a permitted egress; the run is failed loud below."
            fi
            if [ -n "$SKIPPED_BROKERS" ]; then
              echo ""
              echo "**Skipped (creds missing):** \`$SKIPPED_BROKERS\` — a DEBUG_KEY_FLOW_* secret is unset/expired, so this broker silently stopped refreshing. Restore the repo secret; the run is failed loud below."
            fi
            echo ""
            echo "Brokers attempted: OKX + Bybit (Binance out of scope)."
          } >> "$GITHUB_STEP_SUMMARY"

      # Fail the run LOUD if any broker did not refresh — but only after the
      # reachable-broker PR (if any) has been opened above. Keeps the schema-drift
      # PR flowing while making a broker that dropped out (unreachable OR missing
      # creds) an unmissable red signal, not a silently-green "all stable".
      # Scheduled (non-force) runs re-use the existing cassettes (no live calls)
      # and have all creds present, so neither failed_brokers nor skipped_brokers
      # is set — the daily cron stays green.
      - name: Enforce broker reachability (fail loud on partial)
        if: always()
        env:
          FAILED_BROKERS: ${{ steps.record.outputs.failed_brokers }}
          SKIPPED_BROKERS: ${{ steps.record.outputs.skipped_brokers }}
          RECORD_OUTCOME: ${{ steps.record.outcome }}
        run: |
          rc=0
          if [ -n "$FAILED_BROKERS" ]; then
            echo "::error title=Cassette refresh: broker unreachable::Could not record broker(s): $FAILED_BROKERS (geo-block or outage). Reachable brokers were refreshed and PR'd; these were restored from git unchanged. Re-record the blocked broker(s) from a permitted egress (self-hosted runner / proxy) — do NOT record locally unless you rotate the keys afterward."
            rc=1
          fi
          if [ -n "$SKIPPED_BROKERS" ]; then
            echo "::error title=Cassette refresh: broker creds missing::Broker(s) skipped for missing credentials: $SKIPPED_BROKERS. Every DEBUG_KEY_FLOW_* secret is expected in CI, so a skip means an unset/expired repo secret — that broker silently stopped refreshing for schema drift. Restore the secret in repo Settings → Secrets and variables → Actions."
            rc=1
          fi
          if [ "$RECORD_OUTCOME" != "success" ]; then
            echo "::error::Record/leak-gate step did not succeed (outcome=$RECORD_OUTCOME) — see the 'Record cassettes + leak gate' log."
            rc=1
          fi
          # Explicit `if` (not `&& echo`): GitHub Actions runs this with `bash -eo
          # pipefail`, so a `[ ... ] && echo` that evaluated false would abort the
          # step under errexit before reaching `exit`. The if/exit form is robust.
          if [ "$rc" = "0" ]; then
            echo "All credentialed brokers recorded successfully (or schemas stable)."
          fi
          exit "$rc"

      # tech-debt #8: this workflow is the OKX/Bybit schema-drift early-warning
      # system, but it had NO failure alerting — it failed 17/17 runs (a stale
      # synthesis fixture, fixed in PR #471) with the only signal being red in
      # the Actions tab that everyone learned to ignore. Mirror nightly.yml's
      # dedup'd issue-on-failure so a future regression pages someone. Fires on
      # ANY failed step above (record/leak-gate, broker-reachability, the
      # auto-PR step). Env-passed values only — no untrusted github.event.*.
      - name: Open or update GitHub issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          RUN_ID: ${{ github.run_id }}
          REPO_NAME: ${{ github.repository }}
        with:
          script: |
            const { RUN_ID, REPO_NAME } = process.env;
            const today = new Date().toISOString().slice(0, 10);
            const dedupLabel = "nightly-canary-failure:cassette-refresh";
            const runUrl = `https://github.com/${REPO_NAME}/actions/runs/${RUN_ID}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: dedupLabel,
              per_page: 1,
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Cassette refresh failed again on ${today}. Workflow run: ${runUrl}`,
              });
              return;
            }
            const title = `Cassette refresh failed on ${today}`;
            const body = [
              "The daily OKX/Bybit cassette-refresh workflow failed. This is the broker schema-drift early-warning system — a failure means it is no longer protecting against a live-sync break from a broker API rotation.",
              "",
              `Workflow run: ${runUrl}`,
              "",
              "Likely causes: a broker schema rotation the recorder can't parse, a stale schema-drift synthesis fixture (see analytics-service/scripts/record_cassettes.py), a missing/expired DEBUG_KEY_FLOW_* secret, or a broker geo-block on the GitHub runner.",
              "",
              "Auto-filed by .github/workflows/cassette-refresh.yml. Deduplicated by the `" + dedupLabel + "` label; subsequent failures comment here until this issue is closed.",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["nightly-probe", "p1", dedupLabel],
            });
