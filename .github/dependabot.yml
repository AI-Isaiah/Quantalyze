# Dependabot configuration.
#
# retro-PR188-F9 (pr-test-analyzer #37, MEDIUM/9): with every `uses:` in
# the workflow files pinned to a 40-char SHA (PR #179 / C-0293(b)), there
# is no automated mechanism to surface upstream security or feature
# bumps. SHA-pinning trades the mutable-tag attack vector for a stale-
# version drift problem, and stale pins are silent. Dependabot generates
# PRs in the same SHA-with-tag-comment format PR #179 established, so a
# maintainer just reviews + merges.
#
# Audit reference: docs/runbooks/ci-hardening-review-cluster-gate-2026-05-16.md
# (lines 122-125 noted pinned versions trail upstream by 1-3 majors:
# checkout v4.3.1 vs v6.0.2, setup-node v4.4.0 vs v6.4.0,
# upload-artifact v4.6.2 vs v7.0.1, cache v4.3.0 vs v5.0.5).
#
# npm (root) and pip (analytics-service) ecosystems are covered by the
# update blocks below. The nightly npm-audit job (nightly.yml) is
# detection-only — it gates CI on advisory severity but never opens
# update PRs — so Dependabot is the only mechanism that actually moves
# the pins. (There is no Renovate config anywhere in this repo; an
# earlier version of this comment incorrectly claimed Renovate covered
# npm/python.)
#
# Scope note: pip coverage is now lock-level (tech-debt #7 closed).
# analytics-service/requirements.in is the source manifest; requirements.txt
# is the fully-pinned `uv pip compile --universal` lock that Dockerfile/CI
# install — so the transitive graph Railway builds is reproducible and ccxt is
# pinned exactly. Dependabot opens the bump PR against requirements.txt; a
# human re-runs `make lock` (in analytics-service/) to restore the canonical
# uv/universal format before merging. requirements-dev.txt (test-only, not
# shipped to prod) is intentionally still range-pinned.

version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    # Group security advisories into a single PR so the reviewer pages
    # at most once a week for action bumps.
    groups:
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    labels:
      - "ci"
      - "dependencies"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Same one-page-a-week grouping as github-actions: security advisories
    # collapse into a single PR, routine minor/patch bumps into another.
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"

  - package-ecosystem: pip
    directory: "/analytics-service"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps-py)"
      include: "scope"
    groups:
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"
      pip-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
